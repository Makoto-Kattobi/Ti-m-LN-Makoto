<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Âm Nhạc — LN Kattobi</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.music-page { display:grid; grid-template-columns:320px 1fr; gap:16px; align-items:start; }

.player-card { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; position:sticky; top:76px; }
.player-art { width:100%; aspect-ratio:1; background:linear-gradient(135deg,#1e2d3d,#2c3e50); display:flex; align-items:center; justify-content:center; position:relative; overflow:hidden; }
.player-art::before { content:''; position:absolute; inset:0; background:radial-gradient(circle at 50%,rgba(255,122,46,.15),transparent 70%); }

.vinyl { width:210px; height:210px; border-radius:50%; background:repeating-radial-gradient(circle,#0e0c0a 0,#1a1614 2px,#0e0c0a 4px); border:4px solid #2a2220; display:flex; align-items:center; justify-content:center; animation:spin 10s linear infinite paused; box-shadow:0 0 40px rgba(0,0,0,.5); }
.vinyl.playing { animation-play-state:running; }
.vinyl-c { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,var(--orange),#ff9f5e); display:flex; align-items:center; justify-content:center; font-size:1rem; color:#fff; font-weight:900; }
@keyframes spin { to{transform:rotate(360deg)} }

.p-info { padding:18px 20px 0; text-align:center; }
.p-track { font-size:1rem; font-weight:800; color:var(--text); margin-bottom:3px; }
.p-artist { font-size:.82rem; color:var(--muted); margin-bottom:8px; }
.p-genre { display:inline-block; background:rgba(255,122,46,.12); color:var(--orange); font-size:.7rem; font-weight:700; padding:3px 12px; border-radius:20px; text-transform:uppercase; letter-spacing:.06em; margin-bottom:16px; }

.p-prog { padding:0 20px; margin-bottom:12px; }
.prog-track { width:100%; height:5px; background:var(--border); border-radius:3px; cursor:pointer; }
.prog-fill { height:100%; background:var(--orange); border-radius:3px; width:0%; transition:width .1s; }
.prog-times { display:flex; justify-content:space-between; font-size:.72rem; color:var(--muted); margin-top:6px; }

.p-vol { padding:0 20px; margin-bottom:8px; display:flex; align-items:center; gap:10px; }
.vol-t { flex:1; height:4px; background:var(--border); border-radius:2px; cursor:pointer; }
.vol-f { height:100%; background:var(--muted); border-radius:2px; width:75%; }

.p-ctrl { padding:0 20px 20px; display:flex; align-items:center; justify-content:center; gap:18px; }
.pc { background:none; border:none; color:var(--muted); font-size:1rem; width:38px; height:38px; display:flex; align-items:center; justify-content:center; border-radius:50%; transition:all .15s; }
.pc:hover { color:var(--text); background:var(--bg); }
.pc.on { color:var(--orange); }
.pc-play { width:50px; height:50px; background:var(--orange); color:#fff; font-size:1.1rem; box-shadow:0 4px 14px rgba(255,122,46,.4); }
.pc-play:hover { background:var(--orange-d); color:#fff; transform:scale(1.05); }

.pl-panel { background:var(--card); border:1px solid var(--border); border-radius:6px; overflow:hidden; }
.genre-tabs { display:flex; border-bottom:1px solid var(--border); overflow-x:auto; }
.gt { flex:1; padding:12px 0; border:none; background:none; font-size:.8rem; font-weight:700; color:var(--muted); border-bottom:2px solid transparent; cursor:pointer; transition:all .15s; white-space:nowrap; }
.gt.on, .gt:hover { color:var(--orange); border-bottom-color:var(--orange); }
.track-list { max-height:520px; overflow-y:auto; }
.track-item { display:flex; align-items:center; gap:12px; padding:11px 16px; border-bottom:1px solid var(--border2); cursor:pointer; transition:background .15s; }
.track-item:last-child { border-bottom:none; }
.track-item:hover { background:rgba(255,122,46,.05); }
.track-item.on { background:rgba(255,122,46,.08); border-left:3px solid var(--orange); }
.t-num { width:26px; text-align:center; font-size:.8rem; color:var(--muted); font-weight:700; flex-shrink:0; }
.track-item.on .t-num { color:var(--orange); }
.t-art { width:42px; height:42px; border-radius:4px; background:linear-gradient(135deg,#2c3e50,#374151); display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:1rem; color:rgba(255,255,255,.3); font-weight:900; }
.t-info { flex:1; min-width:0; }
.t-name { font-size:.88rem; font-weight:700; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px; }
.track-item.on .t-name { color:var(--orange); }
.t-artist { font-size:.74rem; color:var(--muted); }
.t-dur { font-size:.76rem; color:var(--muted); font-weight:600; flex-shrink:0; }
.t-fav { background:none; border:none; color:var(--muted2); font-size:.84rem; cursor:pointer; padding:4px; }
.t-fav:hover, .t-fav.on { color:#ef4444; }

.tips-bar { background:linear-gradient(90deg,#1e2d3d,#2c3e50); border-radius:6px; padding:13px 18px; display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.tips-bar i { font-size:1.3rem; color:var(--orange); flex-shrink:0; }
.tips-bar-text { font-size:.84rem; color:rgba(255,255,255,.8); line-height:1.5; }
.tips-bar-text strong { color:#fff; }

@media (max-width:820px) {
  .music-page { grid-template-columns:1fr; }
  .player-card { position:static; }
}
</style>
</head>
<body>
<div id="hdr"></div>
<div class="page-wrap">
  <div class="section-title" style="margin-bottom:14px">
    <i class="fas fa-headphones"></i> Âm Nhạc
    <span class="st-space"></span>
    <span id="ps" style="font-size:.78rem;font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0">Chưa phát</span>
  </div>
  <div class="tips-bar">
    <i class="fas fa-lightbulb"></i>
    <div class="tips-bar-text"><strong>Mẹo:</strong> Dùng phím <strong>← →</strong> để chuyển bài, <strong>Space</strong> để tạm dừng / tiếp tục.</div>
  </div>
  <div class="music-page">
    <!-- Player -->
    <div class="player-card">
      <div class="player-art">
        <div class="vinyl" id="vinyl"><div class="vinyl-c" id="vc">♪</div></div>
      </div>
      <div class="p-info">
        <div class="p-track" id="pt">Chọn bài để bắt đầu</div>
        <div class="p-artist" id="pa">LN Kattobi Music</div>
        <div class="p-genre" id="pg">—</div>
      </div>
      <div class="p-prog">
        <div class="prog-track" id="prt"><div class="prog-fill" id="pf"></div></div>
        <div class="prog-times"><span id="pc">0:00</span><span id="pd">0:00</span></div>
      </div>
      <div class="p-vol">
        <i class="fas fa-volume-low" id="vi" style="color:var(--muted);font-size:.82rem"></i>
        <div class="vol-t" id="vt"><div class="vol-f" id="vf"></div></div>
        <i class="fas fa-volume-high" style="color:var(--muted);font-size:.82rem"></i>
      </div>
      <div class="p-ctrl">
        <button class="pc" id="bs" onclick="toggleShuffle()" title="Trộn bài"><i class="fas fa-shuffle"></i></button>
        <button class="pc" onclick="go(-1)" title="Bài trước"><i class="fas fa-backward-step"></i></button>
        <button class="pc pc-play" id="bp" onclick="togglePlay()"><i class="fas fa-play" id="pi"></i></button>
        <button class="pc" onclick="go(1)" title="Bài tiếp"><i class="fas fa-forward-step"></i></button>
        <button class="pc" id="br" onclick="toggleRepeat()" title="Lặp lại"><i class="fas fa-repeat"></i></button>
      </div>
    </div>
    <!-- Playlist -->
    <div class="pl-panel">
      <div class="genre-tabs">
        <button class="gt on" onclick="switchG('nhat',this)">🎌 Nhạc Nhật</button>
        <button class="gt" onclick="switchG('trung',this)">🏮 Nhạc Trung</button>
        <button class="gt" onclick="switchG('sangtac',this)">🎼 Tự Sáng Tác</button>
      </div>
      <div class="track-list" id="tl"></div>
    </div>
  </div>
</div>
<div id="ftr"></div>

<script src="js/app.js"></script>
<script>
const B = '';
const PL = {
  nhat: [
    {id:1,  n:'Unravel',                 a:'TK — Tokyo Ghoul OST',         d:'3:35', c:'🎌'},
    {id:2,  n:'Gurenge',                  a:'LiSA — Kimetsu no Yaiba OP',   d:'4:09', c:'🔥'},
    {id:3,  n:'Homura',                   a:'LiSA — Mugen Train OP',        d:'4:07', c:'🎋'},
    {id:4,  n:'Again',                    a:'YUI — Fullmetal Alchemist OP',  d:'4:10', c:'⚙️'},
    {id:5,  n:'Shinzou wo Sasageyo',      a:'Linked Horizon — Attack on Titan',d:'4:38',c:'⚔️'},
    {id:6,  n:'Silhouette',               a:'KANA-BOON — Naruto Shippuden OP',d:'3:45',c:'🍃'},
    {id:7,  n:'Tank!',                    a:'The Seatbelts — Cowboy Bebop',  d:'3:35', c:'🚀'},
    {id:8,  n:'Alchemy',                  a:'Fullmetal Alchemist Ending',    d:'4:20', c:'🌟'},
    {id:9,  n:'Crossing Field',           a:'LiSA — Sword Art Online OP',   d:'4:29', c:'⚡'},
    {id:10, n:'99',                        a:'mob choir — Mob Psycho 100',   d:'3:20', c:'💫'},
  ],
  trung: [
    {id:11, n:'Thiên Ngoại Phi Tiên',     a:'Guqin & Erhu · Cổ Phong',     d:'3:58', c:'古'},
    {id:12, n:'Vạn Lý Giang Hồ',         a:'Pipa Solo · Lan Nhã',          d:'5:10', c:'江'},
    {id:13, n:'Tương Tư Phú',            a:'Nguyệt Cầm Ensemble',          d:'3:44', c:'月'},
    {id:14, n:'Hồng Trần',               a:'OST Drama · Bạch Lộc',        d:'3:30', c:'紅'},
    {id:15, n:'Kiếm Lâm Phong Vân',      a:'Nhạc Phim · Cổ Trang',        d:'4:22', c:'劍'},
    {id:16, n:'Tiêu Tương Dạ Vũ',        a:'Cổ Cầm · Meditation',         d:'6:22', c:'雨'},
    {id:17, n:'Bách Niên Cô Độc',        a:'Nhạc Khí Cổ · Trần Kỳ',      d:'4:55', c:'孤'},
    {id:18, n:'Phượng Cầu Kỳ Hoàng',     a:'Guqin Duo',                   d:'3:59', c:'鳳'},
  ],
  sangtac: [
    {id:19, n:'— Thêm nhạc của bạn —',   a:'Chỉnh sửa file am-nhac.html', d:'0:00', c:'🎼'},
  ],
};

let cg = 'nhat', ci = 0, playing = false, shuffle = false, repeat = false;
let prog = 0, vol = 75, tmr = null;
const favs = new Set();

function list() { return PL[cg]; }
function track() { return list()[ci]; }

function switchG(g, btn) {
  cg = g; ci = 0;
  document.querySelectorAll('.gt').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderList();
}

function renderList() {
  const l = list();
  document.getElementById('tl').innerHTML = l.map((t,i) => `
    <div class="track-item ${i===ci?'on':''}" id="ti${i}" onclick="selTrack(${i})">
      <div class="t-num">${i===ci&&playing?'<i class="fas fa-volume-high" style="color:var(--orange);font-size:.75rem"></i>':i+1}</div>
      <div class="t-art">${t.c}</div>
      <div class="t-info"><div class="t-name">${t.n}</div><div class="t-artist">${t.a}</div></div>
      <span class="t-dur">${t.d}</span>
      <button class="t-fav ${favs.has(t.id)?'on':''}" onclick="event.stopPropagation();toggleFav(${i})"><i class="${favs.has(t.id)?'fas':'far'} fa-heart"></i></button>
    </div>`).join('');
}

function updateUI() {
  const t = track(); if (!t) return;
  document.getElementById('pt').textContent = t.n;
  document.getElementById('pa').textContent = t.a;
  document.getElementById('vc').textContent = t.c;
  document.getElementById('pd').textContent = t.d;
  const gn = {'nhat':'Nhạc Nhật','trung':'Nhạc Trung','sangtac':'Tự Sáng Tác'};
  document.getElementById('pg').textContent = gn[cg]||'';
  document.getElementById('pi').className = 'fas ' + (playing?'fa-pause':'fa-play');
  document.getElementById('vinyl').className = 'vinyl' + (playing?' playing':'');
  document.getElementById('ps').textContent = playing ? '♪ ' + t.n : 'Đã dừng';
  updateProg();
  renderList();
  const el = document.getElementById('ti'+ci);
  if (el) el.scrollIntoView({block:'nearest',behavior:'smooth'});
}

function updateProg() {
  document.getElementById('pf').style.width = prog + '%';
  const [m,s] = track().d.split(':').map(Number);
  const tot = m*60+s, el = Math.round(tot*prog/100);
  const em=Math.floor(el/60), es=el%60;
  document.getElementById('pc').textContent = em+':'+(es<10?'0'+es:es);
}

function selTrack(i) { ci=i; prog=0; playing=true; clearInterval(tmr); tmr=setInterval(tick,100); updateUI(); }
function togglePlay() {
  playing = !playing;
  clearInterval(tmr);
  if (playing) tmr = setInterval(tick, 100);
  updateUI();
}
function go(d) {
  clearInterval(tmr);
  ci = shuffle ? Math.floor(Math.random()*list().length) : (ci+d+list().length)%list().length;
  prog=0; playing=true; tmr=setInterval(tick,100); updateUI();
}
function toggleShuffle() { shuffle=!shuffle; document.getElementById('bs').classList.toggle('on',shuffle); }
function toggleRepeat()  { repeat=!repeat;  document.getElementById('br').classList.toggle('on',repeat); }
function toggleFav(i) { const t=list()[i]; favs.has(t.id)?favs.delete(t.id):favs.add(t.id); renderList(); }

function tick() {
  if (!playing) return;
  const [m,s] = track().d.split(':').map(Number);
  const tot = (m*60+s)*10;
  if (tot <= 0) return;
  prog = Math.min(100, prog + 100/tot);
  if (prog >= 100) { prog=0; if (!repeat) go(1); else updateProg(); return; }
  updateProg();
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('prt').addEventListener('click', e => {
    const r = document.getElementById('prt').getBoundingClientRect();
    prog = Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100));
    updateProg();
  });
  document.getElementById('vt').addEventListener('click', e => {
    const r = document.getElementById('vt').getBoundingClientRect();
    vol = Math.max(0,Math.min(100,(e.clientX-r.left)/r.width*100));
    document.getElementById('vf').style.width = vol+'%';
  });
  renderList(); updateUI();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if (e.code==='Space') { e.preventDefault(); togglePlay(); }
  if (e.key==='ArrowRight') go(1);
  if (e.key==='ArrowLeft') go(-1);
});

async function boot() {
  document.getElementById('hdr').innerHTML = renderHeader('amnhac', B);
  document.getElementById('ftr').innerHTML = renderFooter(B);
  initDark();
}
boot();
</script>
</body>
</html>
