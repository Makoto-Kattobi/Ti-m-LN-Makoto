<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tin Tức — MộcThư</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── News layout ── */
    .news-grid {
      display: flex; flex-direction: column; gap: 0;
      background: var(--card);
      border: 1px solid var(--border);
      border-top: none;
      border-radius: 0 0 6px 6px;
    }

    /* Featured news (first item) */
    .news-featured {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background .15s;
    }
    .news-featured:hover { background: rgba(255,122,46,.04); }

    .news-thumb {
      width: 280px; aspect-ratio: 16/10;
      overflow: hidden; flex-shrink: 0;
      background: linear-gradient(135deg, #374151, #1e2d3d);
      display: flex; align-items: center; justify-content: center;
    }
    .news-thumb-ph {
      font-size: 4rem; color: rgba(255,255,255,.15);
      font-weight: 900; user-select: none;
    }
    .news-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .news-body {
      padding: 20px 24px;
      display: flex; flex-direction: column; gap: 8px;
    }
    .news-label {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .68rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .news-label.red    { color: #ef4444; }
    .news-label.gold   { color: #f59e0b; }
    .news-label.blue   { color: #3b82f6; }
    .news-label.purple { color: #8b5cf6; }
    .news-label.orange { color: var(--orange); }
    .news-label.green  { color: #10b981; }
    .news-label i { font-size: .72rem; }

    .news-hot-badge {
      background: #ef4444; color: #fff;
      font-size: .62rem; font-weight: 800;
      padding: 1px 7px; border-radius: 3px;
      text-transform: uppercase; letter-spacing: .04em;
    }

    .news-title {
      font-size: 1.05rem; font-weight: 800;
      color: var(--text); line-height: 1.4;
    }
    .news-featured:hover .news-title { color: var(--orange); }

    .news-excerpt {
      font-size: .86rem; color: var(--muted);
      line-height: 1.65;
      display: -webkit-box; -webkit-line-clamp: 3;
      -webkit-box-orient: vertical; overflow: hidden;
    }

    .news-meta {
      display: flex; gap: 14px; align-items: center;
      font-size: .74rem; color: var(--muted);
      flex-wrap: wrap;
    }
    .news-meta i { margin-right: 4px; color: var(--muted2); }
    .news-meta .author { font-weight: 700; color: var(--text2); }

    /* Regular news item */
    .news-item {
      display: flex; gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border2);
      cursor: pointer; transition: background .15s;
    }
    .news-item:last-child { border-bottom: none; }
    .news-item:hover { background: rgba(255,122,46,.04); }

    .news-item-thumb {
      width: 100px; height: 72px;
      flex-shrink: 0; overflow: hidden;
      border-radius: 4px;
      background: linear-gradient(135deg, #374151, #1e2d3d);
      display: flex; align-items: center; justify-content: center;
    }
    .news-item-thumb-ph {
      font-size: 1.6rem; color: rgba(255,255,255,.2);
      font-weight: 900; user-select: none;
    }
    .news-item-thumb img { width: 100%; height: 100%; object-fit: cover; }

    .news-item-body { flex: 1; min-width: 0; }
    .news-item-label {
      font-size: .65rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .08em;
      margin-bottom: 4px;
    }
    .news-item-title {
      font-size: .9rem; font-weight: 800;
      color: var(--text); line-height: 1.4;
      margin-bottom: 5px;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
    }
    .news-item:hover .news-item-title { color: var(--orange); }
    .news-item-excerpt {
      font-size: .78rem; color: var(--muted); line-height: 1.5;
      display: -webkit-box; -webkit-line-clamp: 2;
      -webkit-box-orient: vertical; overflow: hidden;
      margin-bottom: 5px;
    }
    .news-item-meta {
      font-size: .72rem; color: var(--muted);
      display: flex; gap: 12px; flex-wrap: wrap;
    }
    .news-item-meta i { margin-right: 3px; color: var(--muted2); }

    /* Category filter */
    .cat-bar {
      display: flex; flex-wrap: wrap; gap: 5px;
      margin-bottom: 14px;
    }
    .cat-btn {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card); color: var(--text2);
      font-size: .74rem; font-weight: 700;
      cursor: pointer; transition: all .15s;
    }
    .cat-btn:hover, .cat-btn.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }

    /* News detail modal */
    .news-modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      z-index: 999; display: flex;
      align-items: flex-start; justify-content: center;
      padding: 40px 16px; overflow-y: auto;
    }
    .news-modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      max-width: 720px; width: 100%;
      padding: 32px 36px;
      position: relative;
      animation: slideUp .25s ease;
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .modal-close {
      position: absolute; top: 16px; right: 16px;
      background: var(--bg); border: none;
      width: 34px; height: 34px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem; color: var(--text);
      cursor: pointer; transition: background .15s;
    }
    .modal-close:hover { background: #ef4444; color: #fff; }
    .modal-label { margin-bottom: 10px; }
    .modal-title {
      font-size: 1.5rem; font-weight: 900;
      color: var(--text); line-height: 1.3; margin-bottom: 12px;
    }
    .modal-meta {
      display: flex; gap: 14px; flex-wrap: wrap;
      font-size: .78rem; color: var(--muted);
      padding-bottom: 16px; margin-bottom: 20px;
      border-bottom: 1px solid var(--border2);
    }
    .modal-meta i { margin-right: 4px; color: var(--orange); }
    .modal-body {
      font-size: .96rem; line-height: 1.85; color: var(--text2);
    }
    .modal-body p { margin-bottom: 1em; }
    .modal-body strong { color: var(--text); }
    .modal-body blockquote {
      border-left: 3px solid var(--orange);
      padding: 10px 16px; margin: 1em 0;
      background: rgba(255,122,46,.05);
      color: var(--text2); font-style: italic;
      border-radius: 0 4px 4px 0;
    }
    .modal-body ul { padding-left: 20px; margin-bottom: 1em; }
    .modal-body ul li { margin-bottom: 4px; }

    /* Comments in modal */
    .modal-comments { margin-top: 24px; padding-top: 20px; border-top: 1px solid var(--border2); }
    .modal-comments-title { font-size: .9rem; font-weight: 800; color: var(--text); margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }
    .modal-comments-title i { color: var(--orange); }
    .mcmt-form { display: flex; gap: 10px; margin-bottom: 16px; }
    .mcmt-av {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #ff9f6b);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .85rem; flex-shrink: 0;
    }
    .mcmt-form textarea {
      flex: 1; min-height: 58px; resize: vertical;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 7px 11px; font-family: inherit; font-size: .84rem;
      color: var(--text); background: var(--card); outline: none;
    }
    .mcmt-form textarea:focus { border-color: var(--orange); }
    .mcmt-submit {
      background: var(--orange); color: #fff; border: none;
      padding: 6px 16px; border-radius: 4px; font-size: .76rem; font-weight: 700; cursor: pointer;
    }
    .mcmt-item {
      display: flex; gap: 9px; padding: 10px 0; border-bottom: 1px solid var(--border2);
    }
    .mcmt-item:last-child { border-bottom: none; }
    .mcmt-av2 {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: .82rem; flex-shrink: 0;
    }
    .mcmt-body { flex: 1; }
    .mcmt-head { display: flex; gap: 8px; align-items: baseline; margin-bottom: 2px; }
    .mcmt-user { font-weight: 800; font-size: .8rem; color: var(--text); }
    .mcmt-time { font-size: .7rem; color: var(--muted); }
    .mcmt-text { font-size: .84rem; color: var(--text2); line-height: 1.55; }

    @media (max-width: 640px) {
      .news-featured { grid-template-columns: 1fr; }
      .news-thumb { width: 100%; aspect-ratio: 16/8; }
      .news-modal { padding: 22px 18px; }
      .modal-title { font-size: 1.2rem; }
    }
  </style>
</head>
<body>

<div id="header-wrap"></div>

<div class="page-wrap">
  <div class="two-col">
    <main id="main-col">
      <!-- Category filter -->
      <div class="cat-bar" id="cat-bar">
        <button class="cat-btn active" data-cat="" onclick="filterCat('',this)">Tất cả</button>
        <button class="cat-btn" data-cat="Chuyển Thể" onclick="filterCat('Chuyển Thể',this)"><i class="fas fa-film"></i> Chuyển Thể</button>
        <button class="cat-btn" data-cat="Cuộc Thi" onclick="filterCat('Cuộc Thi',this)"><i class="fas fa-trophy"></i> Cuộc Thi</button>
        <button class="cat-btn" data-cat="Cập Nhật" onclick="filterCat('Cập Nhật',this)"><i class="fas fa-bullhorn"></i> Cập Nhật</button>
        <button class="cat-btn" data-cat="Phỏng Vấn" onclick="filterCat('Phỏng Vấn',this)"><i class="fas fa-microphone"></i> Phỏng Vấn</button>
        <button class="cat-btn" data-cat="Bảng Xếp Hạng" onclick="filterCat('Bảng Xếp Hạng',this)"><i class="fas fa-chart-bar"></i> Bảng XH</button>
        <button class="cat-btn" data-cat="Review" onclick="filterCat('Review',this)"><i class="fas fa-star"></i> Review</button>
      </div>

      <div class="section-title">
        <i class="fas fa-newspaper"></i> Tin Tức &amp; Sự Kiện
        <span class="spacer"></span>
        <span id="news-count" style="font-size:.76rem;font-weight:600;color:var(--muted);text-transform:none;letter-spacing:0"></span>
      </div>

      <div class="news-grid" id="news-grid">
        <div class="loading"><div class="spinner"></div>Đang tải tin tức...</div>
      </div>
    </main>

    <div id="right-wrap"></div>
  </div>
</div>

<!-- News detail modal -->
<div class="news-modal-overlay" id="news-modal" style="display:none" onclick="closeModal(event)">
  <div class="news-modal" id="modal-content">
    <button class="modal-close" onclick="closeModalDirect()"><i class="fas fa-times"></i></button>
    <div id="modal-body"></div>
  </div>
</div>

<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const DATA_DIR = '';
let allNews = [], filtered = [], activeCat = '';

const LABEL_ICON = {
  'Chuyển Thể':   'fas fa-film',
  'Cuộc Thi':     'fas fa-trophy',
  'Cập Nhật':     'fas fa-bullhorn',
  'Phỏng Vấn':    'fas fa-microphone',
  'Bảng Xếp Hạng':'fas fa-chart-bar',
  'Review':       'fas fa-star',
};

async function init() {
  document.getElementById('header-wrap').innerHTML = renderHeader('tintuc', DATA_DIR);
  document.getElementById('footer-wrap').innerHTML = renderFooter(DATA_DIR);
  initDark();

  try {
    const [truyen, news] = await Promise.all([
      fetchJSON('data/truyen.json'),
      fetchJSON('data/tintuc.json')
    ]);
    allNews = news;
    document.getElementById('right-wrap').innerHTML = renderRightSidebar(truyen, DATA_DIR);
    initTabs('#featured-box', '[data-tab]', '[data-pane]');
    filterCat('', document.querySelector('.cat-btn.active'));
  } catch(e) {
    document.getElementById('news-grid').innerHTML =
      `<div class="loading" style="color:var(--orange)"><i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>Không tải được tin tức: ${e.message}</div>`;
  }
}

function filterCat(cat, btn) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  filtered = cat ? allNews.filter(n => n.the_loai === cat) : [...allNews];
  document.getElementById('news-count').textContent = `${filtered.length} bài`;
  renderNews();
}

function renderNews() {
  if (!filtered.length) {
    document.getElementById('news-grid').innerHTML =
      `<div style="padding:40px;text-align:center;color:var(--muted)"><i class="fas fa-newspaper" style="font-size:1.5rem;display:block;margin-bottom:8px;color:var(--muted2)"></i>Không có tin tức trong danh mục này.</div>`;
    return;
  }

  let html = '';
  filtered.forEach((n, i) => {
    const icon = LABEL_ICON[n.the_loai] || 'fas fa-circle';
    if (i === 0) {
      // Featured card
      html += `
      <div class="news-featured" onclick="openModal('${n.id}')">
        <div class="news-thumb">
          ${n.hinh_anh ? `<img src="${n.hinh_anh}" alt="">` : `<div class="news-thumb-ph">${n.hinh_text}</div>`}
        </div>
        <div class="news-body">
          <div class="news-label ${n.the_loai_color}">
            <i class="${icon}"></i> ${n.the_loai}
            ${n.hot ? '<span class="news-hot-badge">HOT</span>' : ''}
          </div>
          <div class="news-title">${n.tieu_de}</div>
          <div class="news-excerpt">${n.tom_tat}</div>
          <div class="news-meta">
            <span><i class="far fa-user"></i><span class="author">${n.tac_gia}</span></span>
            <span><i class="far fa-calendar"></i>${n.ngay_dang}</span>
            <span><i class="far fa-eye"></i>${n.luot_xem}</span>
            <span><i class="far fa-comment"></i>${n.binh_luan}</span>
          </div>
        </div>
      </div>`;
    } else {
      html += `
      <div class="news-item" onclick="openModal('${n.id}')">
        <div class="news-item-thumb">
          ${n.hinh_anh ? `<img src="${n.hinh_anh}" alt="">` : `<div class="news-item-thumb-ph">${n.hinh_text}</div>`}
        </div>
        <div class="news-item-body">
          <div class="news-item-label ${n.the_loai_color}" style="color:var(--${n.the_loai_color === 'red'?'tag-action':n.the_loai_color === 'gold'?'tag-comedy':n.the_loai_color === 'blue'?'tag-isekai':n.the_loai_color === 'purple'?'tag-fantasy':n.the_loai_color === 'green'?'tag-vn':'orange'})">
            <i class="${icon}"></i> ${n.the_loai}
            ${n.hot ? '<span class="news-hot-badge">HOT</span>' : ''}
          </div>
          <div class="news-item-title">${n.tieu_de}</div>
          <div class="news-item-excerpt">${n.tom_tat}</div>
          <div class="news-item-meta">
            <span><i class="far fa-user"></i>${n.tac_gia}</span>
            <span><i class="far fa-calendar"></i>${n.ngay_dang}</span>
            <span><i class="far fa-eye"></i>${n.luot_xem}</span>
            <span><i class="far fa-comment"></i>${n.binh_luan}</span>
          </div>
        </div>
      </div>`;
    }
  });

  document.getElementById('news-grid').innerHTML = html;
}

function openModal(id) {
  const n = allNews.find(x => x.id === id);
  if (!n) return;
  const icon = LABEL_ICON[n.the_loai] || 'fas fa-circle';

  document.getElementById('modal-body').innerHTML = `
    <div class="modal-label">
      <span class="news-label ${n.the_loai_color}" style="font-size:.72rem">
        <i class="${icon}"></i> ${n.the_loai}
        ${n.hot ? '<span class="news-hot-badge">HOT</span>' : ''}
      </span>
    </div>
    <div class="modal-title">${n.tieu_de}</div>
    <div class="modal-meta">
      <span><i class="fas fa-user"></i>${n.tac_gia}</span>
      <span><i class="far fa-calendar"></i>${n.ngay_dang}</span>
      <span><i class="far fa-eye"></i>${n.luot_xem} lượt xem</span>
      <span><i class="far fa-comment"></i>${n.binh_luan} bình luận</span>
    </div>
    <div class="modal-body">${n.noi_dung}</div>

    <div class="modal-comments">
      <div class="modal-comments-title"><i class="fas fa-comments"></i> Bình Luận <span style="background:var(--orange);color:#fff;padding:1px 8px;border-radius:10px;font-size:.7rem;font-weight:800">${n.binh_luan}</span></div>
      <div class="mcmt-form">
        <div class="mcmt-av"><i class="fas fa-user"></i></div>
        <div style="flex:1">
          <textarea placeholder="Viết bình luận của bạn..."></textarea>
          <div style="display:flex;justify-content:flex-end;margin-top:6px">
            <button class="mcmt-submit">Gửi</button>
          </div>
        </div>
      </div>
      <div class="mcmt-item">
        <div class="mcmt-av2" style="background:linear-gradient(135deg,#3b82f6,#60a5fa)">N</div>
        <div class="mcmt-body">
          <div class="mcmt-head"><span class="mcmt-user">Nguyên</span><span class="mcmt-time">2 giờ trước</span></div>
          <div class="mcmt-text">Tin tức hay quá! Cảm ơn nhóm đã cập nhật thông tin.</div>
        </div>
      </div>
      <div class="mcmt-item">
        <div class="mcmt-av2" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa)">M</div>
        <div class="mcmt-body">
          <div class="mcmt-head"><span class="mcmt-user">Mộng Huyễn</span><span class="mcmt-time">5 giờ trước</span></div>
          <div class="mcmt-text">Ôi trời ơi không ngờ lại có tin vui như vậy!</div>
        </div>
      </div>
    </div>`;

  document.getElementById('news-modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('news-modal')) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById('news-modal').style.display = 'none';
  document.body.style.overflow = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

init();
</script>
</body>
</html>
