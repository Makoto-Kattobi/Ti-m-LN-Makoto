<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chi Tiết Truyện — MộcThư</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── Story Header ── */
    .story-hero {
      background: linear-gradient(135deg, #1e2d3d 0%, #2c3e50 60%, #1a2532 100%);
      border-radius: 6px;
      padding: 24px;
      display: grid;
      grid-template-columns: 180px 1fr;
      gap: 22px;
      margin-bottom: 0;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
    }
    .story-hero::before {
      content: attr(data-kanji);
      position: absolute; right: -10px; top: 50%; transform: translateY(-50%);
      font-size: 10rem; color: rgba(255,255,255,.04);
      font-weight: 900; pointer-events: none; user-select: none;
      line-height: 1;
    }
    .hero-cover {
      width: 180px; aspect-ratio: 2/3;
      border-radius: 5px; overflow: hidden;
      background: linear-gradient(135deg, #374151, #111827);
      box-shadow: 0 8px 24px rgba(0,0,0,.4);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .hero-cover-ph {
      font-size: 4rem; color: rgba(255,255,255,.2);
      font-weight: 900; user-select: none;
    }
    .hero-cover img { width: 100%; height: 100%; object-fit: cover; }
    .hero-info { min-width: 0; display: flex; flex-direction: column; gap: 8px; position: relative; z-index: 1; }
    .hero-label {
      font-size: .72rem; color: rgba(255,255,255,.5);
      text-transform: uppercase; letter-spacing: .1em;
    }
    .hero-title {
      font-size: 1.7rem; font-weight: 900; color: #fff; line-height: 1.2;
    }
    .hero-original {
      font-size: .9rem; color: rgba(255,255,255,.45); font-style: italic;
    }
    .hero-tags { display: flex; flex-wrap: wrap; gap: 5px; }
    .hero-metas { display: flex; flex-direction: column; gap: 5px; }
    .hero-meta-row {
      font-size: .82rem; color: rgba(255,255,255,.7);
      display: flex; align-items: center; gap: 8px;
    }
    .hero-meta-row label {
      color: rgba(255,255,255,.4); font-size: .75rem;
      text-transform: uppercase; letter-spacing: .06em;
      min-width: 90px; font-style: normal;
    }
    .hero-stats {
      display: flex; gap: 22px;
      padding-top: 12px;
      border-top: 1px solid rgba(255,255,255,.1);
    }
    .hero-stat { display: flex; flex-direction: column; }
    .hero-stat-num {
      font-size: 1.3rem; font-weight: 900; color: #fff;
      line-height: 1;
    }
    .hero-stat-label { font-size: .68rem; color: rgba(255,255,255,.45); text-transform: uppercase; letter-spacing: .06em; }
    .hero-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .hero-btn {
      padding: 10px 20px; font-size: .82rem; font-weight: 700;
      border-radius: 5px; border: none; display: flex; align-items: center; gap: 7px;
      transition: all .2s; cursor: pointer;
    }
    .hero-btn.primary { background: var(--orange); color: #fff; }
    .hero-btn.primary:hover { background: var(--orange-d); }
    .hero-btn.outline {
      background: transparent; color: rgba(255,255,255,.85);
      border: 1px solid rgba(255,255,255,.25);
    }
    .hero-btn.outline:hover { background: rgba(255,255,255,.1); color: #fff; }
    .status-badge-hero {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .75rem; color: rgba(255,255,255,.7);
    }
    .status-dot-hero {
      width: 8px; height: 8px; border-radius: 50%; background: #10b981;
    }
    .status-dot-hero.done { background: #3b82f6; }

    /* ── Description ── */
    .story-desc-box {
      background: var(--card);
      border: 1px solid var(--border); border-top: none;
      padding: 18px 22px;
    }
    .desc-head {
      font-size: .82rem; font-weight: 800; color: var(--text);
      text-transform: uppercase; letter-spacing: .06em;
      padding-bottom: 10px; margin-bottom: 12px;
      border-bottom: 2px solid var(--orange); display: inline-block;
    }
    .desc-text {
      font-size: .92rem; color: var(--text2); line-height: 1.8;
      white-space: pre-line;
    }
    .desc-text em { color: var(--orange); font-style: normal; font-weight: 700; }

    /* ── Chapter list ── */
    .chapter-list-box {
      background: var(--card);
      border: 1px solid var(--border); border-top: none;
      border-radius: 0 0 6px 6px;
      margin-bottom: 16px;
    }
    .chapter-list-head {
      padding: 12px 16px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border2);
    }
    .chapter-list-title {
      font-size: .82rem; font-weight: 800;
      text-transform: uppercase; letter-spacing: .04em;
      color: var(--text); display: flex; align-items: center; gap: 7px;
    }
    .chapter-list-title i { color: var(--orange); }
    .chapter-count {
      background: var(--orange); color: #fff;
      font-size: .7rem; font-weight: 800;
      padding: 2px 9px; border-radius: 10px;
    }
    .chapter-search {
      position: relative;
    }
    .chapter-search input {
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      padding: 6px 12px 6px 30px;
      font-size: .78rem; border-radius: 4px;
      outline: none; width: 200px;
      transition: border-color .2s;
    }
    .chapter-search input:focus { border-color: var(--orange); }
    .chapter-search i {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: .75rem; color: var(--muted);
    }
    .chap-list { max-height: 420px; overflow-y: auto; }
    .chap-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border2);
      transition: background .15s; cursor: pointer;
    }
    .chap-item:last-child { border-bottom: none; }
    .chap-item:hover { background: rgba(255,122,46,.05); }
    .chap-item i { color: var(--muted2); font-size: .75rem; flex-shrink: 0; }
    .chap-item a {
      flex: 1; min-width: 0;
      font-size: .85rem; font-weight: 600; color: var(--text);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chap-item:hover a { color: var(--orange); }
    .chap-item-time { font-size: .72rem; color: var(--muted); flex-shrink: 0; }
    .chap-item-new {
      background: #ef4444; color: #fff;
      font-size: .58rem; font-weight: 800;
      padding: 1px 6px; border-radius: 3px;
      flex-shrink: 0;
    }

    /* ── Comments ── */
    .comments-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      margin-bottom: 16px;
    }
    .comments-head-bar {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; color: var(--text); font-size: .9rem;
    }
    .comments-head-bar i { color: var(--orange); }
    .cmt-count {
      background: var(--orange); color: #fff;
      font-size: .7rem; font-weight: 800; padding: 1px 9px; border-radius: 10px;
    }
    .cmt-form {
      padding: 14px 16px;
      display: flex; gap: 10px;
      border-bottom: 1px solid var(--border);
    }
    .cmt-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #ff9f6b);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .9rem; flex-shrink: 0;
    }
    .cmt-form textarea {
      flex: 1; min-height: 62px;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 12px; font-family: inherit; font-size: .85rem;
      resize: vertical; outline: none;
      color: var(--text); background: var(--card);
      transition: border-color .2s;
    }
    .cmt-form textarea:focus { border-color: var(--orange); }
    .cmt-form-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
    .cmt-submit {
      background: var(--orange); color: #fff;
      border: none; padding: 7px 18px;
      border-radius: 4px; font-size: .78rem; font-weight: 700;
    }
    .cmt-submit:hover { background: var(--orange-d); }
    .cmt-item {
      padding: 14px 16px;
      border-bottom: 1px solid var(--border2);
      display: flex; gap: 10px;
    }
    .cmt-item:last-child { border-bottom: none; }
    .cmt-item-av {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .cmt-item-body { flex: 1; }
    .cmt-item-head { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; }
    .cmt-user { font-weight: 800; font-size: .82rem; color: var(--text); }
    .cmt-time { font-size: .72rem; color: var(--muted); }
    .cmt-text { font-size: .87rem; line-height: 1.6; color: var(--text2); }
    .cmt-actions {
      margin-top: 5px; display: flex; gap: 14px;
      font-size: .72rem; color: var(--muted);
    }
    .cmt-actions a { color: var(--muted); transition: color .15s; }
    .cmt-actions a:hover { color: var(--orange); }

    @media (max-width: 640px) {
      .story-hero { grid-template-columns: 120px 1fr; gap: 14px; padding: 16px; }
      .hero-cover { width: 120px; }
      .hero-title { font-size: 1.3rem; }
      .hero-stats { gap: 14px; }
      .hero-stat-num { font-size: 1rem; }
      .chapter-search input { width: 140px; }
    }
  </style>
</head>
<body>

<div id="header-wrap"></div>

<div class="page-wrap">
  <div class="two-col">
    <main id="main-col">
      <div id="story-hero-wrap">
        <div class="loading"><div class="spinner"></div>Đang tải...</div>
      </div>
    </main>
    <div id="right-wrap"></div>
  </div>
</div>

<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const DATA_DIR = '';

async function init() {
  document.getElementById('header-wrap').innerHTML = renderHeader('', DATA_DIR);
  document.getElementById('footer-wrap').innerHTML = renderFooter(DATA_DIR);
  initDark();

  const id = getParam('id');
  if (!id) { showError('Không tìm thấy truyện.'); return; }

  try {
    const [allTruyen, allChuong] = await Promise.all([
      fetchJSON('data/truyen.json'),
      fetchJSON('data/chuong.json')
    ]);

    const t = allTruyen.find(x => x.id === id);
    if (!t) { showError(`Không tìm thấy truyện với id: "${id}"`); return; }

    document.title = `${t.ten} — MộcThư`;

    const chuongData = allChuong[id];
    const chuongList = chuongData ? chuongData.chuong : [];

    document.getElementById('right-wrap').innerHTML = renderRightSidebar(allTruyen, DATA_DIR);
    initTabs('#featured-box', '[data-tab]', '[data-pane]');

    const dotCls = t.trang_thai === 'done' ? 'done' : '';
    const badge = t.trang_thai ? getStatusInfo(t.trang_thai) : null;

    document.getElementById('story-hero-wrap').innerHTML = `
      <div class="story-hero" data-kanji="${t.bia_text}">
        <div class="hero-cover">
          ${t.bia ? `<img src="${t.bia}" alt="${t.ten}">` : `<div class="hero-cover-ph">${t.bia_text}</div>`}
        </div>
        <div class="hero-info">
          <div class="hero-label">Light Novel · Truyện Chữ</div>
          <div class="hero-title">${t.ten}</div>
          ${t.ten_goc ? `<div class="hero-original">${t.ten_goc}</div>` : ''}
          <div class="hero-tags">${renderTags(t.the_loai)}</div>
          <div class="hero-metas">
            <div class="hero-meta-row"><label>Tác giả</label> <span>${t.tac_gia}</span></div>
            <div class="hero-meta-row"><label>Dịch giả</label> <span>${t.dich_gia}</span></div>
            <div class="hero-meta-row"><label>Trạng thái</label>
              <span class="status-badge-hero">
                <span class="status-dot-hero ${dotCls}"></span>${t.trang_thai_text}
              </span>
            </div>
          </div>
          <div class="hero-stats">
            <div class="hero-stat">
              <span class="hero-stat-num">${t.luot_doc}</span>
              <span class="hero-stat-label">Lượt đọc</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-num">★ ${t.danh_gia}</span>
              <span class="hero-stat-label">Đánh giá</span>
            </div>
            <div class="hero-stat">
              <span class="hero-stat-num">${t.so_chuong}</span>
              <span class="hero-stat-label">Chương</span>
            </div>
          </div>
          <div class="hero-actions">
            ${chuongList.length > 0
              ? `<button class="hero-btn primary" onclick="location.href='chuong.html?truyen=${t.id}&so=1'"><i class="fas fa-book-open"></i> Đọc từ đầu</button>
                 <button class="hero-btn primary" onclick="location.href='chuong.html?truyen=${t.id}&so=${chuongList[chuongList.length-1].so}'"><i class="fas fa-forward"></i> Đọc mới nhất</button>`
              : `<button class="hero-btn primary" disabled><i class="fas fa-book-open"></i> Chưa có chương</button>`
            }
            <button class="hero-btn outline"><i class="far fa-bookmark"></i> Theo dõi</button>
            <button class="hero-btn outline"><i class="fas fa-share-alt"></i> Chia sẻ</button>
          </div>
        </div>
      </div>

      <div class="story-desc-box">
        <div class="desc-head">Giới Thiệu</div>
        <div class="desc-text">${t.mo_ta.replace(/「(.+?)」/g, '<em>「$1」</em>')}</div>
      </div>

      <div class="section-title" style="border-radius:0;margin-top:-1px">
        <i class="fas fa-list"></i> Danh Sách Chương
        <span class="spacer"></span>
        <span class="chapter-count">${chuongList.length} chương</span>
      </div>

      <div class="chapter-list-box">
        <div class="chapter-list-head">
          <div class="chapter-list-title"><i class="fas fa-book"></i> Chương truyện</div>
          <div class="chapter-search">
            <i class="fas fa-search"></i>
            <input type="text" id="chap-search" placeholder="Tìm chương..." oninput="filterChapters(this.value)">
          </div>
        </div>
        <div class="chap-list" id="chap-list">
          ${chuongList.length > 0
            ? renderChapterList(chuongList, t.id)
            : `<div style="padding:30px;text-align:center;color:var(--muted)">
                <i class="fas fa-book" style="font-size:1.5rem;display:block;margin-bottom:8px;color:var(--muted2)"></i>
                Chưa có chương nào. Hãy thêm chương vào file data/chuong.json
               </div>`
          }
        </div>
      </div>

      <div class="comments-box">
        <div class="comments-head-bar">
          <i class="fas fa-comments"></i> Bình Luận
          <span class="cmt-count">12</span>
        </div>
        <div class="cmt-form">
          <div class="cmt-avatar"><i class="fas fa-user"></i></div>
          <div style="flex:1">
            <textarea placeholder="Viết bình luận của bạn về truyện này..."></textarea>
            <div class="cmt-form-actions">
              <button class="cmt-submit">Gửi bình luận</button>
            </div>
          </div>
        </div>
        <div class="cmt-item">
          <div class="cmt-item-av" style="background:linear-gradient(135deg,#3b82f6,#60a5fa)">N</div>
          <div class="cmt-item-body">
            <div class="cmt-item-head"><span class="cmt-user">Nguyên</span><span class="cmt-time">2 giờ trước</span></div>
            <div class="cmt-text">Đọc bộ này từ hồi mới ra, đến giờ vẫn theo dõi đều. Cốt truyện phát triển rất tự nhiên, không bị gượng ép.</div>
            <div class="cmt-actions"><a href="#"><i class="far fa-thumbs-up"></i> 18</a><a href="#"><i class="far fa-comment"></i> Trả lời</a></div>
          </div>
        </div>
        <div class="cmt-item">
          <div class="cmt-item-av" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa)">M</div>
          <div class="cmt-item-body">
            <div class="cmt-item-head"><span class="cmt-user">Mộng Huyễn</span><span class="cmt-time">5 giờ trước</span></div>
            <div class="cmt-text">Main character phát triển rất đẹp, từng arc đều có điểm nhấn riêng. Cảm ơn nhóm dịch!</div>
            <div class="cmt-actions"><a href="#"><i class="far fa-thumbs-up"></i> 11</a><a href="#"><i class="far fa-comment"></i> Trả lời</a></div>
          </div>
        </div>
        <div class="cmt-item">
          <div class="cmt-item-av" style="background:linear-gradient(135deg,#10b981,#34d399)">T</div>
          <div class="cmt-item-body">
            <div class="cmt-item-head"><span class="cmt-user">Tiểu Kiếm</span><span class="cmt-time">1 ngày trước</span></div>
            <div class="cmt-text">Nhóm dịch chuẩn, giữ được cái hồn của nguyên tác. Chờ chương mới!</div>
            <div class="cmt-actions"><a href="#"><i class="far fa-thumbs-up"></i> 7</a><a href="#"><i class="far fa-comment"></i> Trả lời</a></div>
          </div>
        </div>
      </div>
    `;

  } catch(e) {
    showError('Lỗi khi tải dữ liệu: ' + e.message);
    console.error(e);
  }
}

function renderChapterList(list, truyenId) {
  return list.map((c, i) => `
    <div class="chap-item">
      <i class="fas fa-file-alt"></i>
      <a href="chuong.html?truyen=${truyenId}&so=${c.so}">${c.ten}</a>
      ${i >= list.length - 3 ? '<span class="chap-item-new">MỚI</span>' : ''}
      <span class="chap-item-time">${c.thoi_gian || ''}</span>
    </div>`).join('');
}

function filterChapters(q) {
  document.querySelectorAll('.chap-item').forEach(el => {
    const text = el.querySelector('a').textContent.toLowerCase();
    el.style.display = text.includes(q.toLowerCase()) ? '' : 'none';
  });
}

function showError(msg) {
  document.getElementById('story-hero-wrap').innerHTML = `
    <div class="loading" style="color:var(--orange)">
      <i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>${msg}
      <br><a href="index.html" style="color:var(--orange);margin-top:12px;display:inline-block">← Về trang chủ</a>
    </div>`;
}

init();
</script>
</body>
</html>
