<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chi Tiết Truyện — LN Kattobi</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.hero {
  background: linear-gradient(135deg,#1e2d3d,#2c3e50,#1a2532);
  border: 1px solid var(--border); border-radius:6px;
  padding: 24px; display: grid;
  grid-template-columns: 180px 1fr; gap: 22px;
  position: relative; overflow: hidden;
}
.hero::before {
  content: attr(data-k); position: absolute; right:-10px; top:50%;
  transform: translateY(-50%); font-size:10rem;
  color: rgba(255,255,255,.04); font-weight:900; pointer-events:none;
}
.hero-cover {
  width:180px; aspect-ratio:2/3; border-radius:5px;
  overflow:hidden; background:linear-gradient(135deg,#374151,#111827);
  box-shadow:0 8px 24px rgba(0,0,0,.4); flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.hero-cover img { width:100%; height:100%; object-fit:cover; }
.hc-ph { font-size:3.5rem; color:rgba(255,255,255,.2); font-weight:900; }
.hero-info { display:flex; flex-direction:column; gap:8px; position:relative; z-index:1; }
.hero-title { font-size:1.7rem; font-weight:900; color:#fff; line-height:1.2; }
.hero-orig { font-size:.9rem; color:rgba(255,255,255,.45); font-style:italic; }
.hero-tags { display:flex; flex-wrap:wrap; gap:5px; }
.hero-row { font-size:.84rem; color:rgba(255,255,255,.7); display:flex; gap:8px; align-items:center; }
.hero-row label { color:rgba(255,255,255,.4); font-size:.76rem; text-transform:uppercase; letter-spacing:.06em; min-width:90px; }
.hero-stats { display:flex; gap:22px; padding-top:12px; border-top:1px solid rgba(255,255,255,.1); }
.hstat-num { font-size:1.3rem; font-weight:900; color:#fff; line-height:1; }
.hstat-lbl { font-size:.68rem; color:rgba(255,255,255,.45); text-transform:uppercase; }
.hero-btns { display:flex; gap:8px; flex-wrap:wrap; }
.hbtn {
  padding:10px 20px; font-size:.84rem; font-weight:700;
  border-radius:5px; border:none; cursor:pointer;
  display:flex; align-items:center; gap:7px; transition:all .2s;
}
.hbtn.pri { background:var(--orange); color:#fff; }
.hbtn.pri:hover { background:var(--orange-d); }
.hbtn.out { background:transparent; color:rgba(255,255,255,.85); border:1px solid rgba(255,255,255,.25); }
.hbtn.out:hover { background:rgba(255,255,255,.1); }

.desc-box { background:var(--card); border:1px solid var(--border); border-top:none; padding:18px 22px; }
.desc-label { font-size:.82rem; font-weight:800; color:var(--text); text-transform:uppercase; letter-spacing:.06em; padding-bottom:10px; margin-bottom:12px; border-bottom:2px solid var(--orange); display:inline-block; }
.desc-text { font-size:.95rem; color:var(--text2); line-height:1.8; white-space:pre-line; }

.chap-box { background:var(--card); border:1px solid var(--border); border-top:none; border-radius:0 0 6px 6px; margin-bottom:16px; }
.chap-box-head { padding:12px 16px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid var(--border2); }
.chap-box-title { font-size:.84rem; font-weight:800; text-transform:uppercase; letter-spacing:.04em; color:var(--text); display:flex; align-items:center; gap:7px; }
.chap-box-title i { color:var(--orange); }
.chap-cnt { background:var(--orange); color:#fff; font-size:.7rem; font-weight:800; padding:2px 9px; border-radius:10px; }
.chap-search { position:relative; }
.chap-search input { border:1px solid var(--border); background:var(--bg); color:var(--text); padding:6px 12px 6px 30px; font-size:.8rem; border-radius:4px; outline:none; width:200px; }
.chap-search input:focus { border-color:var(--orange); }
.chap-search i { position:absolute; left:10px; top:50%; transform:translateY(-50%); color:var(--muted); font-size:.76rem; }
.chap-list { max-height:420px; overflow-y:auto; }
.chap-item { display:flex; align-items:center; gap:10px; padding:10px 16px; border-bottom:1px solid var(--border2); transition:background .15s; cursor:pointer; }
.chap-item:last-child { border-bottom:none; }
.chap-item:hover { background:rgba(255,122,46,.05); }
.chap-item i { color:var(--muted2); font-size:.76rem; flex-shrink:0; }
.chap-item a { flex:1; font-size:.88rem; font-weight:600; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.chap-item:hover a { color:var(--orange); }
.chap-item-time { font-size:.74rem; color:var(--muted); flex-shrink:0; }
.chap-new { background:#ef4444; color:#fff; font-size:.6rem; font-weight:800; padding:1px 6px; border-radius:3px; flex-shrink:0; }

.cmt-box { background:var(--card); border:1px solid var(--border); border-radius:6px; margin-bottom:16px; }
.cmt-head { padding:12px 16px; border-bottom:1px solid var(--border); font-weight:800; color:var(--text); display:flex; align-items:center; gap:8px; }
.cmt-head i { color:var(--orange); }
.cmt-badge { background:var(--orange); color:#fff; font-size:.7rem; font-weight:800; padding:1px 9px; border-radius:10px; }
.cmt-form { padding:14px 16px; display:flex; gap:10px; border-bottom:1px solid var(--border); }
.cmt-av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--orange),#ff9f6b); display:flex; align-items:center; justify-content:center; color:#fff; font-size:.9rem; flex-shrink:0; }
.cmt-form textarea { flex:1; min-height:62px; border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-family:inherit; font-size:.88rem; resize:vertical; outline:none; color:var(--text); background:var(--card); }
.cmt-form textarea:focus { border-color:var(--orange); }
.cmt-send { background:var(--orange); color:#fff; border:none; padding:7px 18px; border-radius:4px; font-size:.8rem; font-weight:700; cursor:pointer; margin-top:6px; float:right; }
.cmt-item { padding:14px 16px; border-bottom:1px solid var(--border2); display:flex; gap:10px; }
.cmt-item:last-child { border-bottom:none; }
.cmt-iav { width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:.9rem; flex-shrink:0; }
.cmt-ibody { flex:1; }
.cmt-ihead { display:flex; gap:8px; align-items:baseline; margin-bottom:3px; }
.cmt-user { font-weight:800; font-size:.84rem; color:var(--text); }
.cmt-time { font-size:.74rem; color:var(--muted); }
.cmt-text { font-size:.9rem; line-height:1.6; color:var(--text2); }
.cmt-acts { margin-top:5px; display:flex; gap:14px; font-size:.74rem; color:var(--muted); }
.cmt-acts a { color:var(--muted); }
.cmt-acts a:hover { color:var(--orange); }

@media (max-width:640px) {
  .hero { grid-template-columns:1fr; text-align:center; }
  .hero-cover { width:140px; margin:0 auto; }
  .hero-row { justify-content:center; }
  .hero-stats { justify-content:center; flex-wrap:wrap; }
  .hero-btns { justify-content:center; }
  .chap-search input { width:140px; }
}
</style>
</head>
<body>
<div id="hdr"></div>
<div class="page-wrap">
  <div class="two-col">
    <main id="main-col">
      <div id="hero-wrap"><div class="loading"><div class="spinner"></div>Đang tải...</div></div>
    </main>
    <div id="rsb"></div>
  </div>
</div>
<div id="ftr"></div>

<script src="js/app.js"></script>
<script>
const B = '';
async function boot() {
  document.getElementById('hdr').innerHTML = renderHeader('', B);
  document.getElementById('ftr').innerHTML = renderFooter(B);
  initDark();
  const id = getParam('id');
  if (!id) { err('Không tìm thấy truyện.'); return; }
  try {
    const [all, chaps] = await Promise.all([loadJSON('data/truyen.json'), loadJSON('data/chuong.json')]);
    const t = all.find(x => x.id === id);
    if (!t) { err('Không tìm thấy truyện: ' + id); return; }
    document.title = t.ten + ' — LN Kattobi';
    document.getElementById('rsb').innerHTML = renderSidebar(all, B);
    initTabs('#feat-box','[data-tab]','[data-pane]');
    const cd = chaps[id]; const cl = cd ? cd.chuong : [];
    const dot = t.trang_thai === 'done' ? 'done' : '';
    document.getElementById('hero-wrap').innerHTML = `
      <div class="hero" data-k="${t.bia_text||'書'}">
        <div class="hero-cover">
          ${t.bia ? `<img src="${t.bia}" alt="${t.ten}">` : `<div class="hc-ph">${t.bia_text||'書'}</div>`}
        </div>
        <div class="hero-info">
          <div class="hero-title">${t.ten}</div>
          ${t.ten_goc ? `<div class="hero-orig">${t.ten_goc}</div>` : ''}
          <div class="hero-tags">${renderTags(t.the_loai||[])}</div>
          <div class="hero-row"><label>Tác giả</label>${t.tac_gia||'—'}</div>
          <div class="hero-row"><label>Dịch giả</label>${t.dich_gia||'—'}</div>
          <div class="hero-row"><label>Trạng thái</label>
            <span style="display:flex;align-items:center;gap:5px">
              <span class="status-dot ${dot}"></span>${t.trang_thai_text||'Đang tiến hành'}
            </span>
          </div>
          <div class="hero-stats">
            <div><div class="hstat-num">${t.luot_doc||'0'}</div><div class="hstat-lbl">Lượt đọc</div></div>
            <div><div class="hstat-num">★ ${t.danh_gia||'5.0'}</div><div class="hstat-lbl">Đánh giá</div></div>
            <div><div class="hstat-num">${cl.length||t.so_chuong||0}</div><div class="hstat-lbl">Chương</div></div>
          </div>
          <div class="hero-btns">
            ${cl.length
              ? `<button class="hbtn pri" onclick="location.href='chuong.html?truyen=${t.id}&so=${cl[0].so}'"><i class="fas fa-book-open"></i> Đọc từ đầu</button>
                 <button class="hbtn pri" onclick="location.href='chuong.html?truyen=${t.id}&so=${cl[cl.length-1].so}'"><i class="fas fa-forward"></i> Đọc mới nhất</button>`
              : `<button class="hbtn pri" disabled><i class="fas fa-book-open"></i> Chưa có chương</button>`
            }
            <button class="hbtn out"><i class="far fa-bookmark"></i> Theo dõi</button>
          </div>
        </div>
      </div>
      <div class="desc-box">
        <div class="desc-label">Giới Thiệu</div>
        <div class="desc-text">${t.mo_ta||'Chưa có mô tả.'}</div>
      </div>
      <div class="section-title" style="border-radius:0;margin-top:-1px">
        <i class="fas fa-list"></i> Danh Sách Chương
        <span class="st-space"></span><span class="chap-cnt">${cl.length} chương</span>
      </div>
      <div class="chap-box">
        <div class="chap-box-head">
          <div class="chap-box-title"><i class="fas fa-book"></i> Chương truyện</div>
          <div class="chap-search">
            <i class="fas fa-search"></i>
            <input id="cs" placeholder="Tìm chương..." oninput="filterC(this.value)">
          </div>
        </div>
        <div class="chap-list" id="cl">
          ${cl.length ? cl.map((c,i) => `
            <div class="chap-item">
              <i class="fas fa-file-alt"></i>
              <a href="chuong.html?truyen=${t.id}&so=${c.so}">${c.ten}</a>
              ${i >= cl.length-3 ? '<span class="chap-new">MỚI</span>' : ''}
              <span class="chap-item-time">${c.thoi_gian||''}</span>
            </div>`).join('')
          : `<div class="loading" style="padding:30px">
              <i class="fas fa-book" style="font-size:1.4rem;display:block;margin-bottom:8px;color:var(--muted2)"></i>
              Chưa có chương. Thêm vào file <code>data/chuong.json</code>
             </div>`}
        </div>
      </div>
      <div class="cmt-box">
        <div class="cmt-head"><i class="fas fa-comments"></i> Bình Luận <span class="cmt-badge">0</span></div>
        <div class="cmt-form">
          <div class="cmt-av"><i class="fas fa-user"></i></div>
          <div style="flex:1">
            <textarea placeholder="Viết bình luận..."></textarea>
            <button class="cmt-send">Gửi</button>
          </div>
        </div>
        <div style="padding:30px;text-align:center;color:var(--muted);font-size:.88rem">Chưa có bình luận nào.</div>
      </div>`;
  } catch(e) { err('Lỗi: ' + e.message); }
}

function filterC(q) {
  document.querySelectorAll('.chap-item').forEach(el => {
    el.style.display = el.querySelector('a').textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}
function err(msg) {
  document.getElementById('hero-wrap').innerHTML =
    `<div class="loading" style="color:var(--orange)">
      <i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>${msg}
      <br><a href="index.html" style="color:var(--orange);margin-top:12px;display:inline-block">← Về trang chủ</a>
    </div>`;
}
boot();
</script>
</body>
</html>
