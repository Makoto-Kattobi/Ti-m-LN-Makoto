<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Danh Sách Truyện — MộcThư</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .filter-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .filter-input {
      flex: 1; min-width: 200px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      padding: 9px 14px 9px 36px;
      border-radius: 5px; font-size: .88rem;
      outline: none; position: relative;
      transition: border-color .15s;
    }
    .filter-input:focus { border-color: var(--orange); }
    .filter-input-wrap { position: relative; flex: 1; min-width: 200px; }
    .filter-input-wrap i {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%); color: var(--muted); font-size: .82rem;
    }
    .filter-select {
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text);
      padding: 9px 12px; border-radius: 5px;
      font-size: .84rem; outline: none; cursor: pointer;
    }
    .filter-select:focus { border-color: var(--orange); }
    .filter-btn {
      background: var(--orange); color: #fff;
      border: none; padding: 9px 18px;
      border-radius: 5px; font-size: .84rem; font-weight: 700;
      display: flex; align-items: center; gap: 6px;
    }
    .filter-btn:hover { background: var(--orange-d); }
    .clear-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 9px 14px;
      border-radius: 5px; font-size: .84rem; font-weight: 600;
    }
    .clear-btn:hover { border-color: var(--orange); color: var(--orange); }

    .results-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: -1px;
    }
    .results-count {
      font-size: .82rem; color: var(--muted);
    }
    .results-count strong { color: var(--orange); }

    .story-list-wrap { background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; }
    #main-col { min-width: 0; }

    .empty-state {
      padding: 60px;
      text-align: center;
      color: var(--muted);
    }
    .empty-state i { font-size: 2rem; display: block; margin-bottom: 12px; color: var(--muted2); }
    .empty-state h3 { font-size: 1rem; color: var(--text); margin-bottom: 6px; }
    .empty-state p { font-size: .85rem; }

    .genre-pills {
      display: flex; flex-wrap: wrap; gap: 5px;
      padding: 0 4px; margin-bottom: 8px;
    }
    .genre-pill {
      padding: 4px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--card);
      font-size: .74rem; font-weight: 600;
      color: var(--text2);
      cursor: pointer; transition: all .15s;
    }
    .genre-pill:hover, .genre-pill.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }
  </style>
</head>
<body>

<div id="header-wrap"></div>

<div class="page-wrap">
  <div class="two-col">
    <main id="main-col">
      <!-- Genre quick filters -->
      <div class="genre-pills" id="genre-pills">
        <span class="genre-pill active" onclick="setGenre('')" data-genre="">Tất cả</span>
        <span class="genre-pill" onclick="setGenre('Tiên Hiệp')" data-genre="Tiên Hiệp">Tiên Hiệp</span>
        <span class="genre-pill" onclick="setGenre('Kiếm Hiệp')" data-genre="Kiếm Hiệp">Kiếm Hiệp</span>
        <span class="genre-pill" onclick="setGenre('Ngôn Tình')" data-genre="Ngôn Tình">Ngôn Tình</span>
        <span class="genre-pill" onclick="setGenre('Huyền Huyễn')" data-genre="Huyền Huyễn">Huyền Huyễn</span>
        <span class="genre-pill" onclick="setGenre('Hệ Thống')" data-genre="Hệ Thống">Hệ Thống</span>
        <span class="genre-pill" onclick="setGenre('Ma Đạo')" data-genre="Ma Đạo">Ma Đạo</span>
        <span class="genre-pill" onclick="setGenre('Cổ Đại')" data-genre="Cổ Đại">Cổ Đại</span>
        <span class="genre-pill" onclick="setGenre('Action')" data-genre="Action">Action</span>
        <span class="genre-pill" onclick="setGenre('Romance')" data-genre="Romance">Romance</span>
        <span class="genre-pill" onclick="setGenre('Fantasy')" data-genre="Fantasy">Fantasy</span>
      </div>

      <!-- Filter bar -->
      <div class="filter-bar">
        <div class="filter-input-wrap">
          <i class="fas fa-search"></i>
          <input type="text" id="search-input" class="filter-input" placeholder="Tên truyện, tác giả...">
        </div>
        <select class="filter-select" id="sort-select" onchange="applyFilter()">
          <option value="default">Sắp xếp: Mặc định</option>
          <option value="chapter">Nhiều chương nhất</option>
          <option value="rating">Đánh giá cao nhất</option>
          <option value="az">Tên A → Z</option>
        </select>
        <select class="filter-select" id="status-select" onchange="applyFilter()">
          <option value="">Trạng thái: Tất cả</option>
          <option value="ongoing">Đang tiến hành</option>
          <option value="done">Hoàn thành</option>
        </select>
        <button class="filter-btn" onclick="applyFilter()"><i class="fas fa-filter"></i> Lọc</button>
        <button class="clear-btn" onclick="clearFilter()"><i class="fas fa-times"></i></button>
      </div>

      <div class="results-header">
        <div class="section-title" style="flex:1;border-radius:6px 6px 0 0">
          <i class="fas fa-book"></i> Danh Sách Truyện
          <span class="spacer"></span>
          <span id="results-count" class="results-count"><strong>0</strong> bộ</span>
        </div>
      </div>

      <div class="story-list-wrap" id="story-list">
        <div class="loading"><div class="spinner"></div>Đang tải...</div>
      </div>

      <div class="pager" id="pager"></div>
    </main>

    <div id="right-wrap"></div>
  </div>
</div>

<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const DATA_DIR = '';
const PER_PAGE = 8;
let allTruyen = [], filtered = [], page = 1, activeGenre = '';

async function init() {
  document.getElementById('header-wrap').innerHTML = renderHeader('list', DATA_DIR);
  document.getElementById('footer-wrap').innerHTML = renderFooter(DATA_DIR);
  initDark();

  // Handle URL search param
  const q = getParam('q') || '';
  const loai = getParam('loai') || '';

  try {
    allTruyen = await fetchJSON('data/truyen.json');
    document.getElementById('right-wrap').innerHTML = renderRightSidebar(allTruyen, DATA_DIR);
    initTabs('#featured-box', '[data-tab]', '[data-pane]');

    // Pre-fill search
    if (q) {
      document.getElementById('search-input').value = q;
      activeGenre = q;
      document.querySelectorAll('.genre-pill').forEach(p => {
        p.classList.toggle('active', p.dataset.genre === q);
      });
    }
    if (loai === 'hoanhthanh') {
      document.getElementById('status-select').value = 'done';
    }

    applyFilter();
  } catch(e) {
    document.getElementById('story-list').innerHTML = `<div class="empty-state"><i class="fas fa-exclamation-circle"></i><h3>Không tải được dữ liệu</h3><p>${e.message}</p></div>`;
  }
}

function setGenre(genre) {
  activeGenre = genre;
  document.getElementById('search-input').value = genre;
  document.querySelectorAll('.genre-pill').forEach(p => {
    p.classList.toggle('active', p.dataset.genre === genre);
  });
  applyFilter();
}

function applyFilter() {
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  const sort = document.getElementById('sort-select').value;
  const status = document.getElementById('status-select').value;

  filtered = allTruyen.filter(t => {
    const matchQ = !q ||
      t.ten.toLowerCase().includes(q) ||
      t.tac_gia.toLowerCase().includes(q) ||
      t.the_loai.some(g => g.toLowerCase().includes(q)) ||
      t.mo_ta.toLowerCase().includes(q);
    const matchStatus = !status ||
      (status === 'done' && t.trang_thai === 'done') ||
      (status === 'ongoing' && t.trang_thai !== 'done');
    return matchQ && matchStatus;
  });

  // Sort
  if (sort === 'chapter') filtered.sort((a,b) => b.so_chuong - a.so_chuong);
  else if (sort === 'rating') filtered.sort((a,b) => parseFloat(b.danh_gia) - parseFloat(a.danh_gia));
  else if (sort === 'az') filtered.sort((a,b) => a.ten.localeCompare(b.ten, 'vi'));

  document.getElementById('results-count').innerHTML = `<strong>${filtered.length}</strong> bộ`;
  renderPage(1);
}

function clearFilter() {
  document.getElementById('search-input').value = '';
  document.getElementById('sort-select').value = 'default';
  document.getElementById('status-select').value = '';
  activeGenre = '';
  document.querySelectorAll('.genre-pill').forEach((p,i) => p.classList.toggle('active', i === 0));
  applyFilter();
}

function renderPage(p) {
  page = p;
  const start = (p-1) * PER_PAGE;
  const slice = filtered.slice(start, start + PER_PAGE);

  if (slice.length === 0) {
    document.getElementById('story-list').innerHTML = `
      <div class="empty-state">
        <i class="fas fa-book-open"></i>
        <h3>Không tìm thấy truyện nào</h3>
        <p>Thử từ khóa khác hoặc xóa bộ lọc.</p>
      </div>`;
    document.getElementById('pager').innerHTML = '';
    return;
  }

  document.getElementById('story-list').innerHTML = slice.map(t => renderStoryCard(t, DATA_DIR)).join('');
  renderPager();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderPager() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (total <= 1) { document.getElementById('pager').innerHTML = ''; return; }
  let html = '';
  if (page > 1) html += `<a onclick="renderPage(${page-1})">‹</a>`;
  for (let i = 1; i <= total; i++) {
    if (i === page) html += `<span class="cur">${i}</span>`;
    else if (i <= 2 || i > total-2 || Math.abs(i-page) <= 1) html += `<a onclick="renderPage(${i})">${i}</a>`;
    else if (i === 3 || i === total-2) html += `<span class="dots">...</span>`;
  }
  if (page < total) html += `<a onclick="renderPage(${page+1})">›</a>`;
  document.getElementById('pager').innerHTML = html;
}

// Live search
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('search-input');
  if (inp) {
    inp.addEventListener('input', () => {
      clearTimeout(inp._timer);
      inp._timer = setTimeout(applyFilter, 300);
    });
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') applyFilter();
    });
  }
});

init();
</script>
</body>
</html>
