<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Đọc Chương — LN Kattobi</title>
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
.progress-bar { position:fixed; top:0; left:0; right:0; height:3px; background:transparent; z-index:9999; }
.progress-fill { height:100%; background:var(--orange); width:0%; transition:width .1s; }

.reader-wrap { max-width:820px; margin:0 auto; padding:16px; }

.breadcrumb { font-size:.8rem; color:var(--muted); display:flex; align-items:center; gap:6px; flex-wrap:wrap; margin-bottom:14px; }
.breadcrumb a { color:var(--muted); }
.breadcrumb a:hover { color:var(--orange); }
.breadcrumb .sep { color:var(--muted2); }
.breadcrumb .cur { color:var(--text); font-weight:600; }

.reader-toolbar { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:10px 16px; margin-bottom:12px; display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.tb-label { font-size:.74rem; color:var(--muted); font-weight:700; text-transform:uppercase; letter-spacing:.04em; }
.tb-sep { width:1px; height:18px; background:var(--border); }
.tb-btn { background:var(--bg); border:1px solid var(--border); color:var(--text); padding:5px 12px; font-size:.8rem; font-weight:700; border-radius:4px; transition:all .15s; }
.tb-btn:hover, .tb-btn.on { background:var(--orange); color:#fff; border-color:var(--orange); }

.reader-nav { display:grid; grid-template-columns:1fr auto 1fr; gap:10px; margin-bottom:12px; }
.nav-btn { background:var(--card); border:1px solid var(--border); color:var(--text); padding:11px 16px; font-size:.86rem; font-weight:700; border-radius:6px; transition:all .15s; display:flex; align-items:center; gap:8px; }
.nav-btn:hover:not(:disabled) { background:var(--orange); color:#fff; border-color:var(--orange); }
.nav-btn:disabled { opacity:.4; cursor:default; }
.nav-btn.prev { justify-content:flex-start; }
.nav-btn.next { justify-content:flex-end; }
.nav-btn.mid  { justify-content:center; min-width:130px; flex-shrink:0; }

.chap-select-wrap { text-align:center; margin-bottom:12px; display:none; }
.chap-select { background:var(--card); border:1px solid var(--border); color:var(--text); padding:8px 14px; border-radius:5px; font-size:.84rem; outline:none; max-width:300px; width:100%; }

.reader-body { background:var(--card); border:1px solid var(--border); border-radius:6px; padding:36px 48px; margin-bottom:12px; font-size:1rem; line-height:1.9; color:var(--text); transition:background .3s,color .3s; }
.reader-body.fs-sm { font-size:.9rem; }
.reader-body.fs-md { font-size:1rem; }
.reader-body.fs-lg { font-size:1.15rem; }
.reader-body.fs-xl { font-size:1.3rem; }
.reader-body.th-sepia { background:#f4ead8; color:#3e2c18; border-color:#d4c0a0; }
.reader-body.th-dark  { background:#1a1a1a; color:#c8c8c8; border-color:#333; }
.reader-body.th-green { background:#e8f4e8; color:#1a3a1a; border-color:#b0d0b0; }
.ch-title { font-size:1.5rem; font-weight:900; margin-bottom:6px; }
.ch-meta { font-size:.82rem; color:var(--muted); padding-bottom:20px; margin-bottom:24px; border-bottom:1px solid var(--border2); display:flex; gap:16px; flex-wrap:wrap; }
.ch-meta i { margin-right:4px; color:var(--orange); }
.ch-body p { margin-bottom:1.3em; text-indent:2em; }

.cmt-box { background:var(--card); border:1px solid var(--border); border-radius:6px; margin-bottom:16px; }
.cmt-head { padding:12px 16px; border-bottom:1px solid var(--border); font-weight:800; color:var(--text); display:flex; align-items:center; gap:8px; }
.cmt-head i { color:var(--orange); }
.cmt-badge { background:var(--orange); color:#fff; font-size:.7rem; font-weight:800; padding:1px 9px; border-radius:10px; }
.cmt-form { padding:14px 16px; display:flex; gap:10px; border-bottom:1px solid var(--border); }
.cmt-av { width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg,var(--orange),#ff9f6b); display:flex; align-items:center; justify-content:center; color:#fff; font-size:.9rem; flex-shrink:0; }
.cmt-form textarea { flex:1; min-height:62px; border:1px solid var(--border); border-radius:4px; padding:8px 12px; font-family:inherit; font-size:.88rem; resize:vertical; outline:none; color:var(--text); background:var(--card); }
.cmt-form textarea:focus { border-color:var(--orange); }
.cmt-send { background:var(--orange); color:#fff; border:none; padding:7px 18px; border-radius:4px; font-size:.8rem; font-weight:700; cursor:pointer; margin-top:6px; float:right; }

@media (max-width:600px) {
  .reader-body { padding:20px 16px; }
  .ch-title { font-size:1.2rem; }
  .reader-nav { grid-template-columns:1fr 1fr; }
  .nav-btn.mid { display:none; }
}
</style>
</head>
<body>

<div class="progress-bar"><div class="progress-fill" id="pf"></div></div>

<div id="hdr"></div>
<div class="reader-wrap">
  <div id="bc"></div>

  <div class="reader-toolbar">
    <span class="tb-label">Cỡ chữ</span>
    <button class="tb-btn" onclick="setFont('sm')">A-</button>
    <button class="tb-btn on" id="fm" onclick="setFont('md')">A</button>
    <button class="tb-btn" style="font-size:1rem" onclick="setFont('lg')">A</button>
    <button class="tb-btn" style="font-size:1.1rem" onclick="setFont('xl')">A+</button>
    <div class="tb-sep"></div>
    <span class="tb-label">Nền</span>
    <button class="tb-btn on" id="tw" onclick="setTheme('')">Trắng</button>
    <button class="tb-btn" id="ts" onclick="setTheme('sepia')">Kem</button>
    <button class="tb-btn" id="td" onclick="setTheme('dark')">Tối</button>
    <button class="tb-btn" id="tg" onclick="setTheme('green')">Xanh</button>
    <span style="flex:1"></span>
    <span id="pct" style="font-size:.74rem;color:var(--muted)">0%</span>
  </div>

  <div class="chap-select-wrap" id="csw">
    <select class="chap-select" id="csel" onchange="goChap(this.value)"></select>
  </div>

  <div class="reader-nav">
    <button class="nav-btn prev" id="pb" onclick="go(-1)"><i class="fas fa-chevron-left"></i> Chương trước</button>
    <button class="nav-btn mid" onclick="toggleSel()"><i class="fas fa-list"></i> Chọn chương</button>
    <button class="nav-btn next" id="nb" onclick="go(1)">Chương sau <i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="reader-body fs-md" id="rb">
    <div class="loading"><div class="spinner"></div>Đang tải chương...</div>
  </div>

  <div class="reader-nav">
    <button class="nav-btn prev" onclick="go(-1)"><i class="fas fa-chevron-left"></i> Chương trước</button>
    <button class="nav-btn mid" onclick="scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i> Lên đầu</button>
    <button class="nav-btn next" onclick="go(1)">Chương sau <i class="fas fa-chevron-right"></i></button>
  </div>

  <div class="cmt-box">
    <div class="cmt-head"><i class="fas fa-comments"></i> Bình Luận <span class="cmt-badge">0</span></div>
    <div class="cmt-form">
      <div class="cmt-av"><i class="fas fa-user"></i></div>
      <div style="flex:1">
        <textarea placeholder="Bình luận về chương này..."></textarea>
        <button class="cmt-send">Gửi</button>
      </div>
    </div>
    <div style="padding:24px;text-align:center;color:var(--muted);font-size:.88rem">Chưa có bình luận.</div>
  </div>
</div>
<div id="ftr"></div>

<script src="js/app.js"></script>
<script>
const B = '';
let t = null, cl = [], ci = 0, curF = 'md', curTh = '';
let tmr = null, prog = 0;

async function boot() {
  document.getElementById('hdr').innerHTML = renderHeader('', B);
  document.getElementById('ftr').innerHTML = renderFooter(B);
  initDark();
  try {
    const sf = localStorage.getItem('rf'); const st = localStorage.getItem('rt');
    if (sf) { curF = sf; } if (st !== null) { curTh = st; }
  } catch(e) {}
  applyFont(curF); applyTheme(curTh);

  const tid = getParam('truyen'), so = getParam('so');
  if (!tid) { err('Thiếu tham số.'); return; }
  try {
    const [all, chaps] = await Promise.all([loadJSON('data/truyen.json'), loadJSON('data/chuong.json')]);
    t = all.find(x => x.id === tid);
    if (!t) { err('Không tìm thấy truyện.'); return; }
    const cd = chaps[tid]; cl = cd ? cd.chuong : [];
    if (!cl.length) { err('Truyện chưa có chương nào.'); return; }
    ci = cl.findIndex(c => c.so == so); if (ci < 0) ci = 0;
    const sel = document.getElementById('csel');
    cl.forEach((c,i) => { const o = document.createElement('option'); o.value=i; o.text=c.ten; if(i===ci) o.selected=true; sel.appendChild(o); });
    render();
  } catch(e) { err('Lỗi: ' + e.message); }
}

function render() {
  const c = cl[ci];
  document.title = c.ten + ' — ' + t.ten + ' — LN Kattobi';
  document.getElementById('bc').innerHTML =
    `<div class="breadcrumb">
      <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
      <span class="sep">/</span>
      <a href="truyen.html?id=${t.id}">${t.ten}</a>
      <span class="sep">/</span>
      <span class="cur">${c.ten}</span>
    </div>`;
  document.getElementById('rb').innerHTML =
    `<h1 class="ch-title">${c.ten}</h1>
     <div class="ch-meta">
       <span><i class="fas fa-book"></i>${t.ten}</span>
       <span><i class="fas fa-user-pen"></i>${t.tac_gia||'—'}</span>
       <span><i class="fas fa-language"></i>${t.dich_gia||'—'}</span>
     </div>
     <div class="ch-body">${c.noi_dung||'<p>Nội dung chương chưa được cập nhật.</p>'}</div>`;
  document.getElementById('pb').disabled = ci <= 0;
  document.getElementById('nb').disabled = ci >= cl.length - 1;
  document.getElementById('csel').value = ci;
  prog = 0; updateProg();
  history.replaceState(null,'',`chuong.html?truyen=${t.id}&so=${c.so}`);
  scrollTo({top:0,behavior:'smooth'});
}

function go(d) {
  const ni = ci + d;
  if (ni < 0 || ni >= cl.length) return;
  ci = ni; prog = 0; render();
}
function goChap(i) { ci = parseInt(i); render(); toggleSel(); }
function toggleSel() { const w = document.getElementById('csw'); w.style.display = w.style.display==='none'||!w.style.display?'block':'none'; }

function setFont(f) {
  curF = f; applyFont(f);
  try { localStorage.setItem('rf', f); } catch(e) {}
}
function applyFont(f) {
  const rb = document.getElementById('rb'); if (!rb) return;
  rb.classList.remove('fs-sm','fs-md','fs-lg','fs-xl');
  rb.classList.add('fs-' + f);
  ['sm','md','lg','xl'].forEach((s,i) => {
    const btns = document.querySelectorAll('.tb-btn');
    const fontBtns = [...btns].filter(b => ['A-','A','A','A+'].includes(b.textContent.trim()));
  });
}
function setTheme(th) {
  curTh = th; applyTheme(th);
  try { localStorage.setItem('rt', th); } catch(e) {}
}
function applyTheme(th) {
  const rb = document.getElementById('rb'); if (!rb) return;
  rb.classList.remove('th-sepia','th-dark','th-green');
  if (th) rb.classList.add('th-' + th);
  ['w','s','d','g'].forEach(k => {
    const el = document.getElementById('t'+k);
    if (el) el.classList.remove('on');
  });
  const map = {'':'w','sepia':'s','dark':'d','green':'g'};
  const el = document.getElementById('t' + (map[th]||'w'));
  if (el) el.classList.add('on');
}

function updateProg() {
  const pf = document.getElementById('pf'); const pt = document.getElementById('pct');
  if (pf) pf.style.width = prog + '%';
  if (pt) pt.textContent = Math.round(prog) + '%';
}

window.addEventListener('scroll', () => {
  const d = document.documentElement;
  const p = d.scrollHeight - d.clientHeight;
  prog = p > 0 ? Math.min(100, d.scrollTop / p * 100) : 0;
  updateProg();
});

document.addEventListener('keydown', e => {
  if (e.target.tagName==='TEXTAREA'||e.target.tagName==='INPUT') return;
  if (e.key==='ArrowLeft') go(-1);
  if (e.key==='ArrowRight') go(1);
});

function err(msg) {
  document.getElementById('rb').innerHTML =
    `<div style="text-align:center;padding:40px;color:var(--orange)">
      <i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>
      ${msg}<br>
      <a href="index.html" style="color:var(--orange);margin-top:12px;display:inline-block">← Về trang chủ</a>
    </div>`;
}
boot();
</script>
</body>
</html>
