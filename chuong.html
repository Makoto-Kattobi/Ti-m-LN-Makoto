<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Đọc Chương — MộcThư</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* ── Reader specific ── */
    .reader-wrap {
      max-width: 860px; margin: 0 auto;
      padding: 16px;
    }

    /* Breadcrumb */
    .breadcrumb {
      font-size: .78rem; color: var(--muted);
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; margin-bottom: 14px;
    }
    .breadcrumb a { color: var(--muted); }
    .breadcrumb a:hover { color: var(--orange); }
    .breadcrumb .sep { color: var(--muted2); }
    .breadcrumb .current { color: var(--text); font-weight: 600; }

    /* Controls toolbar */
    .reader-toolbar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 10px 16px;
      margin-bottom: 12px;
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    }
    .toolbar-label {
      font-size: .72rem; color: var(--muted);
      font-weight: 700; text-transform: uppercase;
      letter-spacing: .04em;
    }
    .toolbar-sep { width: 1px; height: 18px; background: var(--border); }
    .ctrl-btn {
      background: var(--bg); border: 1px solid var(--border);
      color: var(--text); padding: 5px 11px;
      font-size: .78rem; font-weight: 700;
      border-radius: 4px; transition: all .15s;
    }
    .ctrl-btn:hover, .ctrl-btn.active {
      background: var(--orange); color: #fff; border-color: var(--orange);
    }
    .ctrl-btn.xl { font-size: 1rem; }

    /* Nav (prev/next) */
    .reader-nav {
      display: grid; grid-template-columns: 1fr auto 1fr;
      gap: 10px; margin-bottom: 12px;
    }
    .nav-btn {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 11px 16px;
      font-size: .84rem; font-weight: 700;
      border-radius: 6px; transition: all .15s;
      display: flex; align-items: center; gap: 8px;
    }
    .nav-btn:hover { background: var(--orange); color: #fff; border-color: var(--orange); }
    .nav-btn:disabled { opacity: .4; cursor: not-allowed; }
    .nav-btn:disabled:hover { background: var(--card); color: var(--text); border-color: var(--border); }
    .nav-btn.prev { justify-content: flex-start; }
    .nav-btn.next { justify-content: flex-end; }
    .nav-btn.center {
      justify-content: center; text-align: center;
      padding: 11px 14px; min-width: 140px; flex-shrink: 0;
    }

    /* Chapter select dropdown */
    .chapter-select-wrap {
      text-align: center;
    }
    .chapter-select {
      background: var(--card); border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px;
      border-radius: 5px; font-size: .82rem;
      outline: none; max-width: 280px; width: 100%;
      cursor: pointer;
    }

    /* Content area */
    .reader-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 36px 48px;
      margin-bottom: 12px;
      transition: background .3s, color .3s;
      font-size: 17px;
      line-height: 1.9;
      color: var(--text);
    }
    .reader-content.font-sm { font-size: 15px; }
    .reader-content.font-md { font-size: 17px; }
    .reader-content.font-lg { font-size: 19px; }
    .reader-content.font-xl { font-size: 21px; }

    .reader-content.theme-sepia {
      background: #f4ead8;
      color: #3e2c18;
      border-color: #d4c0a0;
    }
    .reader-content.theme-dark {
      background: #1a1a1a;
      color: #c8c8c8;
      border-color: #333;
    }
    .reader-content.theme-green {
      background: #e8f4e8;
      color: #1a3a1a;
      border-color: #b0d0b0;
    }

    .chapter-title {
      font-size: 1.5rem; font-weight: 900;
      margin-bottom: 6px;
      color: inherit; line-height: 1.3;
    }
    .chapter-meta {
      font-size: .82rem; color: var(--muted);
      padding-bottom: 20px; margin-bottom: 24px;
      border-bottom: 1px solid var(--border2);
      display: flex; gap: 16px; flex-wrap: wrap;
    }
    .chapter-meta i { margin-right: 4px; color: var(--orange); }
    .chapter-body p { margin-bottom: 1.3em; text-indent: 2em; }
    .chapter-body em { font-style: italic; }
    .chapter-body strong { font-weight: 800; }

    /* Progress bar */
    .read-progress {
      position: fixed; top: 0; left: 0; right: 0;
      height: 3px; background: transparent; z-index: 9999;
    }
    .read-progress-fill {
      height: 100%; background: var(--orange);
      width: 0%; transition: width .1s;
    }

    /* Comments (same as truyen.html) */
    .comments-box {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 6px; margin-bottom: 16px;
    }
    .comments-head-bar {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      font-weight: 800; color: var(--text); font-size: .9rem;
    }
    .comments-head-bar i { color: var(--orange); }
    .cmt-count {
      background: var(--orange); color: #fff;
      font-size: .7rem; font-weight: 800; padding: 1px 9px; border-radius: 10px;
    }
    .cmt-form { padding: 14px 16px; display: flex; gap: 10px; border-bottom: 1px solid var(--border); }
    .cmt-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: linear-gradient(135deg, var(--orange), #ff9f6b);
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-size: .9rem; flex-shrink: 0;
    }
    .cmt-form textarea {
      flex: 1; min-height: 62px;
      border: 1px solid var(--border); border-radius: 4px;
      padding: 8px 12px; font-family: inherit; font-size: .85rem;
      resize: vertical; outline: none;
      color: var(--text); background: var(--card);
    }
    .cmt-form textarea:focus { border-color: var(--orange); }
    .cmt-form-actions { display: flex; justify-content: flex-end; margin-top: 6px; }
    .cmt-submit {
      background: var(--orange); color: #fff; border: none;
      padding: 7px 18px; border-radius: 4px; font-size: .78rem; font-weight: 700;
    }
    .cmt-item { padding: 14px 16px; border-bottom: 1px solid var(--border2); display: flex; gap: 10px; }
    .cmt-item:last-child { border-bottom: none; }
    .cmt-item-av {
      width: 36px; height: 36px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 800; font-size: .9rem; flex-shrink: 0;
    }
    .cmt-item-body { flex: 1; }
    .cmt-item-head { display: flex; gap: 8px; align-items: baseline; margin-bottom: 3px; }
    .cmt-user { font-weight: 800; font-size: .82rem; color: var(--text); }
    .cmt-time { font-size: .72rem; color: var(--muted); }
    .cmt-text { font-size: .87rem; line-height: 1.6; color: var(--text2); }
    .cmt-actions { margin-top: 5px; display: flex; gap: 14px; font-size: .72rem; color: var(--muted); }
    .cmt-actions a { color: var(--muted); }
    .cmt-actions a:hover { color: var(--orange); }

    @media (max-width: 640px) {
      .reader-content { padding: 20px 18px; }
      .chapter-title { font-size: 1.2rem; }
      .reader-nav { grid-template-columns: 1fr 1fr; }
      .nav-btn.center { display: none; }
      .chapter-select-wrap { display: block; margin-bottom: 10px; }
    }
  </style>
</head>
<body>

<div class="read-progress"><div class="read-progress-fill" id="progress-fill"></div></div>

<div id="header-wrap"></div>

<div class="reader-wrap">
  <div id="breadcrumb-wrap"></div>

  <!-- Controls -->
  <div class="reader-toolbar">
    <span class="toolbar-label">Cỡ chữ</span>
    <button class="ctrl-btn" onclick="setFont('sm')">A-</button>
    <button class="ctrl-btn active" id="font-md-btn" onclick="setFont('md')">A</button>
    <button class="ctrl-btn xl" onclick="setFont('lg')">A</button>
    <button class="ctrl-btn xl" onclick="setFont('xl')" style="font-size:1.2rem">A</button>
    <div class="toolbar-sep"></div>
    <span class="toolbar-label">Nền</span>
    <button class="ctrl-btn active" id="theme-white-btn" onclick="setTheme('')">Trắng</button>
    <button class="ctrl-btn" id="theme-sepia-btn" onclick="setTheme('sepia')">Kem</button>
    <button class="ctrl-btn" id="theme-dark-btn" onclick="setTheme('dark')">Tối</button>
    <button class="ctrl-btn" id="theme-green-btn" onclick="setTheme('green')">Xanh</button>
    <div class="toolbar-sep"></div>
    <button class="ctrl-btn" onclick="window.scrollTo({top:0,behavior:'smooth'})"><i class="fas fa-arrow-up"></i></button>
    <span style="flex:1"></span>
    <span id="progress-text" style="font-size:.72rem;color:var(--muted)">0%</span>
  </div>

  <!-- Chapter selector dropdown -->
  <div class="chapter-select-wrap" id="chap-select-wrap" style="display:none;margin-bottom:12px">
    <select class="chapter-select" id="chap-select" onchange="goToChapter(this.value)">
    </select>
  </div>

  <!-- Nav top -->
  <div class="reader-nav" id="nav-top">
    <button class="nav-btn prev" id="prev-btn-top" onclick="navigate(-1)">
      <i class="fas fa-chevron-left"></i> Chương trước
    </button>
    <button class="nav-btn center" onclick="toggleChapSelect()">
      <i class="fas fa-list"></i> Chọn chương
    </button>
    <button class="nav-btn next" id="next-btn-top" onclick="navigate(1)">
      Chương sau <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- Content -->
  <div class="reader-content" id="reader-content">
    <div style="text-align:center;padding:40px">
      <div class="spinner"></div>
      <div style="color:var(--muted)">Đang tải chương...</div>
    </div>
  </div>

  <!-- Nav bottom -->
  <div class="reader-nav">
    <button class="nav-btn prev" id="prev-btn-bot" onclick="navigate(-1)">
      <i class="fas fa-chevron-left"></i> Chương trước
    </button>
    <button class="nav-btn center" onclick="window.scrollTo({top:0,behavior:'smooth'})">
      <i class="fas fa-arrow-up"></i> Lên đầu
    </button>
    <button class="nav-btn next" id="next-btn-bot" onclick="navigate(1)">
      Chương sau <i class="fas fa-chevron-right"></i>
    </button>
  </div>

  <!-- Comments -->
  <div class="comments-box">
    <div class="comments-head-bar">
      <i class="fas fa-comments"></i> Bình Luận Chương
      <span class="cmt-count" id="cmt-count">0</span>
    </div>
    <div class="cmt-form">
      <div class="cmt-avatar"><i class="fas fa-user"></i></div>
      <div style="flex:1">
        <textarea placeholder="Bình luận về chương này..."></textarea>
        <div class="cmt-form-actions">
          <button class="cmt-submit">Gửi</button>
        </div>
      </div>
    </div>
    <div id="comments-list">
      <div class="cmt-item">
        <div class="cmt-item-av" style="background:linear-gradient(135deg,#3b82f6,#60a5fa)">A</div>
        <div class="cmt-item-body">
          <div class="cmt-item-head"><span class="cmt-user">Araragi</span><span class="cmt-time">9 giờ trước</span></div>
          <div class="cmt-text">Peak! Plot twist bất ngờ quá, không nghĩ được.</div>
          <div class="cmt-actions"><a href="#"><i class="far fa-thumbs-up"></i> 8</a><a href="#"><i class="far fa-comment"></i> Trả lời</a></div>
        </div>
      </div>
      <div class="cmt-item">
        <div class="cmt-item-av" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa)">T</div>
        <div class="cmt-item-body">
          <div class="cmt-item-head"><span class="cmt-user">Thiên Long</span><span class="cmt-time">1 ngày trước</span></div>
          <div class="cmt-text">Đọc một mạch không ngừng được. Cảm ơn nhóm dịch!</div>
          <div class="cmt-actions"><a href="#"><i class="far fa-thumbs-up"></i> 14</a><a href="#"><i class="far fa-comment"></i> Trả lời</a></div>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const DATA_DIR = '';
let truyen = null, chuongList = [], currentIdx = 0;
let curFont = 'md', curTheme = '';

async function init() {
  document.getElementById('header-wrap').innerHTML = renderHeader('', DATA_DIR);
  document.getElementById('footer-wrap').innerHTML = renderFooter(DATA_DIR);
  initDark();

  // Restore reader settings
  try {
    const sf = localStorage.getItem('reader-font');
    const st = localStorage.getItem('reader-theme');
    if (sf) { curFont = sf; }
    if (st !== null) { curTheme = st; }
  } catch(e) {}
  applyFont(curFont);
  applyTheme(curTheme);

  const truyenId = getParam('truyen');
  const soStr    = getParam('so');

  if (!truyenId) { showError('Thiếu tham số truyện.'); return; }

  try {
    const [allTruyen, allChuong] = await Promise.all([
      fetchJSON('data/truyen.json'),
      fetchJSON('data/chuong.json')
    ]);

    truyen = allTruyen.find(x => x.id === truyenId);
    if (!truyen) { showError(`Không tìm thấy truyện: "${truyenId}"`); return; }

    const chuongData = allChuong[truyenId];
    chuongList = chuongData ? chuongData.chuong : [];

    if (chuongList.length === 0) {
      showError('Truyện này chưa có chương nào. Hãy thêm vào data/chuong.json');
      return;
    }

    // Find requested chapter
    const so = parseInt(soStr) || chuongList[0].so;
    currentIdx = chuongList.findIndex(c => c.so == so);
    if (currentIdx < 0) currentIdx = 0;

    // Populate select
    const sel = document.getElementById('chap-select');
    chuongList.forEach((c, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.text = c.ten;
      if (i === currentIdx) opt.selected = true;
      sel.appendChild(opt);
    });

    renderChapter();

  } catch(e) {
    showError('Lỗi tải dữ liệu: ' + e.message);
    console.error(e);
  }
}

function renderChapter() {
  const c = chuongList[currentIdx];
  if (!c) return;

  document.title = `${c.ten} — ${truyen.ten} — MộcThư`;

  // Breadcrumb
  document.getElementById('breadcrumb-wrap').innerHTML = `
    <div class="breadcrumb">
      <a href="index.html"><i class="fas fa-home"></i> Trang chủ</a>
      <span class="sep">/</span>
      <a href="truyen.html?id=${truyen.id}">${truyen.ten}</a>
      <span class="sep">/</span>
      <span class="current">${c.ten}</span>
    </div>`;

  // Content
  document.getElementById('reader-content').innerHTML = `
    <h1 class="chapter-title">${c.ten}</h1>
    <div class="chapter-meta">
      <span><i class="fas fa-book"></i>${truyen.ten}</span>
      <span><i class="fas fa-user-pen"></i>${truyen.tac_gia}</span>
      <span><i class="fas fa-language"></i>${truyen.dich_gia}</span>
    </div>
    <div class="chapter-body">${c.noi_dung || '<p>Nội dung chương này chưa được cập nhật.</p>'}</div>`;

  // Nav buttons
  updateNavButtons();

  // Update URL without reload
  const newUrl = `chuong.html?truyen=${truyen.id}&so=${c.so}`;
  history.replaceState(null, '', newUrl);

  // Update chapter select
  document.getElementById('chap-select').value = currentIdx;

  // Comments count
  document.getElementById('cmt-count').textContent = Math.floor(Math.random() * 20 + 3);

  window.scrollTo({top: 0, behavior: 'smooth'});
}

function updateNavButtons() {
  const hasPrev = currentIdx > 0;
  const hasNext = currentIdx < chuongList.length - 1;
  ['prev-btn-top','prev-btn-bot'].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = !hasPrev;
    if (hasPrev) {
      btn.title = chuongList[currentIdx - 1].ten;
    }
  });
  ['next-btn-top','next-btn-bot'].forEach(id => {
    const btn = document.getElementById(id);
    btn.disabled = !hasNext;
    if (hasNext) {
      btn.title = chuongList[currentIdx + 1].ten;
    }
  });
}

function navigate(dir) {
  const newIdx = currentIdx + dir;
  if (newIdx < 0 || newIdx >= chuongList.length) return;
  currentIdx = newIdx;
  renderChapter();
}

function goToChapter(idx) {
  currentIdx = parseInt(idx);
  renderChapter();
  document.getElementById('chap-select-wrap').style.display = 'none';
}

function toggleChapSelect() {
  const wrap = document.getElementById('chap-select-wrap');
  wrap.style.display = wrap.style.display === 'none' ? 'block' : 'none';
}

// Font
function setFont(size) {
  curFont = size;
  applyFont(size);
  try { localStorage.setItem('reader-font', size); } catch(e) {}
}
function applyFont(size) {
  const c = document.getElementById('reader-content');
  if (!c) return;
  c.classList.remove('font-sm','font-md','font-lg','font-xl');
  c.classList.add('font-' + size);
  document.querySelectorAll('.ctrl-btn[onclick^="setFont"]').forEach(b => b.classList.remove('active'));
  const map = {'sm':0,'md':1,'lg':2,'xl':3};
  const btns = document.querySelectorAll('.ctrl-btn[onclick^="setFont"]');
  if (btns[map[size]]) btns[map[size]].classList.add('active');
}

// Theme
function setTheme(theme) {
  curTheme = theme;
  applyTheme(theme);
  try { localStorage.setItem('reader-theme', theme); } catch(e) {}
}
function applyTheme(theme) {
  const c = document.getElementById('reader-content');
  if (!c) return;
  c.classList.remove('theme-sepia','theme-dark','theme-green');
  if (theme) c.classList.add('theme-' + theme);
  ['white','sepia','dark','green'].forEach(t => {
    const btn = document.getElementById(`theme-${t}-btn`);
    if (btn) btn.classList.toggle('active', t === (theme || 'white'));
  });
}

// Reading progress
window.addEventListener('scroll', () => {
  const doc = document.documentElement;
  const scrolled = doc.scrollTop;
  const total = doc.scrollHeight - doc.clientHeight;
  const pct = total > 0 ? Math.round(scrolled / total * 100) : 0;
  const fill = document.getElementById('progress-fill');
  const text = document.getElementById('progress-text');
  if (fill) fill.style.width = pct + '%';
  if (text) text.textContent = pct + '%';
});

function showError(msg) {
  document.getElementById('reader-content').innerHTML =
    `<div style="text-align:center;padding:40px;color:var(--orange)">
      <i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>
      ${msg}<br>
      <a href="index.html" style="color:var(--orange);margin-top:12px;display:inline-block">← Về trang chủ</a>
    </div>`;
}

// Keyboard navigation
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA' || e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowLeft')  navigate(-1);
  if (e.key === 'ArrowRight') navigate(1);
});

init();
</script>
</body>
</html>
