<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MộcThư — Đọc Truyện Chữ Miễn Phí</title>
  <meta name="description" content="MộcThư - Thư viện truyện chữ tiếng Việt lớn nhất. Đọc miễn phí, cập nhật nhanh, dịch chất lượng cao.">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .story-list-wrap { background: var(--card); border: 1px solid var(--border); border-top: none; border-radius: 0 0 6px 6px; }
    #main-col { min-width: 0; }
  </style>
</head>
<body>

<div id="header-wrap"></div>

<div class="page-wrap">
  <div class="three-col">
    <div id="left-wrap"></div>

    <main id="main-col">
      <div class="discord-bar" onclick="window.open('https://discord.gg','_blank')">
        <i class="fab fa-discord"></i>
        <div class="discord-bar-text">
          <div class="discord-bar-title">Tham gia Discord!</div>
          <div class="discord-bar-sub">Thảo luận, hối chương và tương tác cùng cộng đồng</div>
        </div>
        <span class="discord-join">Tham gia ngay</span>
      </div>

      <div class="section-title">
        <i class="fas fa-bolt"></i> Mới Cập Nhật
        <span class="spacer"></span>
        <a href="danh-sach.html">Xem tất cả →</a>
      </div>

      <div class="story-list-wrap" id="story-list">
        <div class="loading"><div class="spinner"></div>Đang tải truyện...</div>
      </div>

      <div class="pager" id="pager"></div>
    </main>

    <div id="right-wrap"></div>
  </div>
</div>

<div id="footer-wrap"></div>

<script src="js/app.js"></script>
<script>
const DATA_DIR = '';
const PER_PAGE = 6;
let allTruyen = [], page = 1;

async function init() {
  document.getElementById('header-wrap').innerHTML = renderHeader('home', DATA_DIR);
  document.getElementById('footer-wrap').innerHTML = renderFooter(DATA_DIR);
  initDark();

  try {
    allTruyen = await fetchJSON('data/truyen.json');
    document.getElementById('left-wrap').innerHTML = renderLeftSidebar(DATA_DIR);
    document.getElementById('right-wrap').innerHTML = renderRightSidebar(allTruyen, DATA_DIR);
    initTabs('#featured-box', '[data-tab]', '[data-pane]');
    renderPage(1);
  } catch(e) {
    document.getElementById('story-list').innerHTML = `<div class="loading" style="color:var(--orange)"><i class="fas fa-exclamation-circle" style="font-size:1.5rem;display:block;margin-bottom:8px"></i>Không thể tải dữ liệu. Vui lòng kiểm tra file data/truyen.json</div>`;
    console.error(e);
  }
}

function renderPage(p) {
  page = p;
  const start = (p-1) * PER_PAGE;
  const slice = allTruyen.slice(start, start + PER_PAGE);
  document.getElementById('story-list').innerHTML = slice.map(t => renderStoryCard(t, DATA_DIR)).join('');
  renderPager();
  window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderPager() {
  const total = Math.ceil(allTruyen.length / PER_PAGE);
  if (total <= 1) { document.getElementById('pager').innerHTML = ''; return; }
  let html = '';
  if (page > 1) html += `<a onclick="renderPage(${page-1})">‹</a>`;
  for (let i = 1; i <= total; i++) {
    if (i === page) html += `<span class="cur">${i}</span>`;
    else if (i <= 2 || i > total-2 || Math.abs(i-page) <= 1) html += `<a onclick="renderPage(${i})">${i}</a>`;
    else if (i === 3 || i === total-2) html += `<span class="dots">...</span>`;
  }
  if (page < total) html += `<a onclick="renderPage(${page+1})">›</a>`;
  document.getElementById('pager').innerHTML = html;
}

init();
</script>
</body>
</html>
